<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>EthicApp Maintenance</title>
    <link rel="icon" href="/favicon/favicon.ico">
    <link rel="stylesheet" href="/static/fonts/nunito/nunito.css">
    <style>
      :root {
        color-scheme: light;
        --brand: #3651ee;
        --ink: #182033;
        --muted: #5b667c;
        --line: #d8deec;
        --surface: #ffffff;
        --page: #f3f6fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        background: var(--page);
        color: var(--ink);
        font-family: "Nunito", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 680px);
        padding: 48px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 18px 48px rgb(24 32 51 / 10%);
      }

      img {
        width: min(260px, 72%);
        height: auto;
        display: block;
        margin-bottom: 40px;
      }

      p.status {
        margin: 0 0 14px;
        color: var(--brand);
        font-size: 0.86rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.05;
      }

      p.message {
        max-width: 56ch;
        margin: 22px 0 0;
        color: var(--muted);
        font-size: 1.12rem;
        line-height: 1.65;
      }

      p.check {
        margin: 32px 0 0;
        padding-top: 24px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.98rem;
      }

      @media (max-width: 560px) {
        body {
          padding: 20px;
        }

        main {
          padding: 32px 24px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/static/logos/ethicapp-logo.svg" alt="EthicApp">
      <p class="status">Scheduled maintenance</p>
      <h1>EthicApp is temporarily unavailable.</h1>
      <p class="message">
        We are performing planned maintenance. Please try again later.
      </p>
      <p class="check">
        The platform is online, but application services are intentionally paused.
      </p>
    </main>
  </body>
</html>
