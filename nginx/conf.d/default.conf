map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    set $ethicapp_backend ethicapp:8501;
    set $auth_backend auth-backend:8502;
    set $ethicapp_student_backend ethicapp-student:8503;
    set $management_console_backend management-console:8504;

    absolute_redirect off;
    client_max_body_size 20m;

    # ---------------------------------------
    # Shared public static assets
    # ---------------------------------------
    location ^~ /static/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ---------------------------------------
    # Shared public favicon assets
    # ---------------------------------------
    location ^~ /favicon/ {
        alias /usr/share/nginx/html/static/favicon/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location ~ ^/(auth|student|mng)/favicon/(.+)$ {
        alias /usr/share/nginx/html/static/favicon/$2;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location ~ ^/(auth|student|mng)/(favicon\.ico|favicon\.svg|apple-touch-icon\.png|site\.webmanifest)$ {
        alias /usr/share/nginx/html/static/favicon/$2;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location ~ ^/(favicon\.ico|favicon\.svg|apple-touch-icon\.png|site\.webmanifest)$ {
        alias /usr/share/nginx/html/static/favicon/$1;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ---------------------------------------
    # Shared public logo assets
    # ---------------------------------------
    location ^~ /images/logos/ {
        alias /usr/share/nginx/html/static/logos/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location ^~ /assets/images/logos/ {
        alias /usr/share/nginx/html/static/logos/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location ~ ^/(auth|student|mng)/(images|assets/images)/logos/(.+)$ {
        alias /usr/share/nginx/html/static/logos/$3;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ---------------------------------------
    # Auth SPA publica
    # Canonical base: /auth
    # ---------------------------------------
    location = / {
        return 302 /auth/;
    }

    location = /auth {
        return 302 /auth/;
    }

    # Backward-compatible redirects for old bare auth routes.
    location ~ ^/(login|logout|register|forgot|reset-password|privacy|terms)$ {
        return 302 /auth$uri;
    }

    location ^~ /auth/assets/ {
        rewrite ^/auth(/assets/.*)$ $1 break;
        proxy_pass http://$auth_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    location = /auth/runtime-config.js {
        rewrite ^/auth/runtime-config\.js$ /runtime-config.js break;
        proxy_pass http://$auth_backend;
        proxy_http_version 1.1;
        add_header Cache-Control "no-store";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    location ^~ /auth/ {
        rewrite ^/auth/.*$ / break;
        proxy_pass http://$auth_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    # ---------------------------------------
    # Auth API pública
    # ---------------------------------------
    location /api/auth/ {
        proxy_pass http://$auth_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    # ---------------------------------------
    # Endpoint interno para auth_request
    # ---------------------------------------
    location = /_auth_check {
        internal;

        proxy_pass http://$auth_backend/auth/session/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";

        proxy_set_header Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header Cookie $http_cookie;
    }

    auth_request_set $auth_user_id $upstream_http_x_user_id;
    auth_request_set $auth_user_role $upstream_http_x_user_role;

    # ---------------------------------------
    # Student app (protected)
    # ---------------------------------------
    location = /student/runtime-config.js {
        proxy_pass http://$ethicapp_student_backend;
        proxy_http_version 1.1;
        add_header Cache-Control "no-store";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    location /student/api/ {
        auth_request /_auth_check;
        error_page 401 = @auth_redirect;

        proxy_pass http://$ethicapp_student_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

        proxy_set_header X-User-Id $auth_user_id;
        proxy_set_header X-User-Role $auth_user_role;
    }

    location /student/ {
        auth_request /_auth_check;
        error_page 401 = @auth_redirect;

        proxy_pass http://$ethicapp_student_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

        proxy_set_header X-User-Id $auth_user_id;
        proxy_set_header X-User-Role $auth_user_role;
    }

    # ---------------------------------------
    # Estáticos públicos de EthicApp
    # ---------------------------------------
    location /public/ {
        auth_request /_auth_check;
        error_page 401 = @auth_redirect;

        proxy_pass http://$ethicapp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

        proxy_set_header X-User-Id $auth_user_id;
        proxy_set_header X-User-Role $auth_user_role;
    }

    location /uploads/ {
        auth_request /_auth_check;
        error_page 401 = @auth_redirect;

        proxy_pass http://$ethicapp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

        proxy_set_header X-User-Id $auth_user_id;
        proxy_set_header X-User-Role $auth_user_role;
    }

    # ---------------------------------------
    # WebSockets de EthicApp
    # ---------------------------------------
    location /socket.io/ {
        auth_request /_auth_check;
        error_page 401 = @auth_redirect;

        proxy_pass http://$ethicapp_backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

        proxy_set_header X-User-Id $auth_user_id;
        proxy_set_header X-User-Role $auth_user_role;

        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    location = /mng {
        return 302 /mng/;
    }

    # ---------------------------------------
    # Management Console (protected + role S)
    # ---------------------------------------
    location ^~ /mng/ {
        auth_request /_auth_check;
        error_page 401 = @auth_redirect;
        error_page 403 = @forbidden;


        proxy_pass http://$management_console_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

        proxy_set_header X-User-Id $auth_user_id;
        proxy_set_header X-User-Role $auth_user_role;
    }

    # ---------------------------------------
    # Todo lo demás: EthicApp protegido
    # ---------------------------------------
    location / {
        auth_request /_auth_check;
        error_page 401 = @auth_redirect;

        proxy_pass http://$ethicapp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

        proxy_set_header X-User-Id $auth_user_id;
        proxy_set_header X-User-Role $auth_user_role;
    }

    location @auth_redirect {
        return 302 /auth/login;
    }

    location @forbidden {
        return 403;
    }
}
