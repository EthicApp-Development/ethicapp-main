map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream ethicapp_upstream {
    server ethicapp:8501;
}

upstream auth_upstream {
    server auth-backend:8502;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # ---------------------------------------
    # Auth SPA pública
    # ---------------------------------------
    location = / {
        proxy_pass http://auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /login {
        proxy_pass http://auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /register {
        proxy_pass http://auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /forgot {
        proxy_pass http://auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /reset-password {
        proxy_pass http://auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------------------------------------
    # Assets de la SPA de auth
    # ---------------------------------------
    location ^~ /auth-assets/ {
        proxy_pass http://auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /favicon.ico {
        proxy_pass http://auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /favicon.svg {
        proxy_pass http://auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /apple-touch-icon.png {
        proxy_pass http://auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /site.webmanifest {
        proxy_pass http://auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------------------------------------
    # Endpoint interno para auth_request
    # ---------------------------------------
    location = /_auth_check {
        internal;

        proxy_pass http://auth_upstream/auth/session/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";

        proxy_set_header Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    auth_request_set $auth_user_id $upstream_http_x_user_id;
    auth_request_set $auth_user_role $upstream_http_x_user_role;
    auth_request_set $auth_user_email $upstream_http_x_user_email;

    # ---------------------------------------
    # Estáticos públicos de EthicApp
    # ---------------------------------------
    location /public/ {
        proxy_pass http://ethicapp_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------------------------------------
    # WebSockets de EthicApp
    # ---------------------------------------
    location /socket.io/ {
        auth_request /_auth_check;
        error_page 401 = @auth_redirect;

        proxy_pass http://ethicapp_upstream;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header X-User-Id $auth_user_id;
        proxy_set_header X-User-Role $auth_user_role;
        proxy_set_header X-User-Email $auth_user_email;

        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    # ---------------------------------------
    # Todo lo demás: EthicApp protegido
    # ---------------------------------------
    location / {
        auth_request /_auth_check;
        error_page 401 = @auth_redirect;

        proxy_pass http://ethicapp_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header X-User-Id $auth_user_id;
        proxy_set_header X-User-Role $auth_user_role;
        proxy_set_header X-User-Email $auth_user_email;
    }

    location @auth_redirect {
        return 302 /login;
    }
}