worker_processes 1;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
  }

  upstream auth_api {
    server auth-backend:8502;
  }

  upstream auth_frontend {
    server auth-backend:5173;
  }

  upstream ethicapp_upstream {
    server ethicapp:8501;
  }

  upstream ethicapp_student_api {
    server ethicapp-student:8503;
  }

  upstream ethicapp_student_frontend {
    server ethicapp-student:5174;
  }

  upstream management_console_api {
    server management-console:8504;
  }

  upstream management_console_frontend {
    server management-console:5175;
  }

  server {
    listen 80;
    server_name _;

    absolute_redirect off;
    client_max_body_size 20m;

    # ======================================
    # SHARED PUBLIC STATIC ASSETS
    # ======================================

    location ^~ /static/ {
      root /usr/share/nginx/html;
      try_files $uri =404;
      expires 30d;
      add_header Cache-Control "public, max-age=2592000";
      access_log off;
    }

    # ======================================
    # CANONICAL FAVICON ASSETS FROM ETHICAPP
    # ======================================

    location ^~ /favicon/ {
      proxy_pass http://ethicapp_upstream/images/favicon/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location ~ ^/(auth|student|mng)/favicon/(.+)$ {
      rewrite ^/(?:auth|student|mng)/favicon/(.+)$ /images/favicon/$1 break;
      proxy_pass http://ethicapp_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location ~ ^/(auth|student|mng)/(favicon\.ico|favicon\.svg|apple-touch-icon\.png|site\.webmanifest)$ {
      rewrite ^/(?:auth|student|mng)/(favicon\.ico|favicon\.svg|apple-touch-icon\.png|site\.webmanifest)$ /images/favicon/$1 break;
      proxy_pass http://ethicapp_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location ^~ /auth/favicon/ {
      proxy_pass http://ethicapp_upstream/images/favicon/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location = /auth/favicon.ico {
      proxy_pass http://ethicapp_upstream/images/favicon/favicon.ico;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location = /auth/favicon.svg {
      proxy_pass http://ethicapp_upstream/images/favicon/favicon.svg;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location = /auth/apple-touch-icon.png {
      proxy_pass http://ethicapp_upstream/images/favicon/apple-touch-icon.png;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location = /auth/site.webmanifest {
      proxy_pass http://ethicapp_upstream/images/favicon/site.webmanifest;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location ^~ /mng/favicon/ {
      proxy_pass http://ethicapp_upstream/images/favicon/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location = /mng/favicon.ico {
      proxy_pass http://ethicapp_upstream/images/favicon/favicon.ico;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location = /mng/favicon.svg {
      proxy_pass http://ethicapp_upstream/images/favicon/favicon.svg;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location = /mng/apple-touch-icon.png {
      proxy_pass http://ethicapp_upstream/images/favicon/apple-touch-icon.png;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location = /mng/site.webmanifest {
      proxy_pass http://ethicapp_upstream/images/favicon/site.webmanifest;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location = /favicon.ico {
      proxy_pass http://ethicapp_upstream/images/favicon/favicon.ico;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location = /favicon.svg {
      proxy_pass http://ethicapp_upstream/images/favicon/favicon.svg;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location = /apple-touch-icon.png {
      proxy_pass http://ethicapp_upstream/images/favicon/apple-touch-icon.png;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location = /site.webmanifest {
      proxy_pass http://ethicapp_upstream/images/favicon/site.webmanifest;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    # ======================================
    # CANONICAL LOGO ASSETS FROM ETHICAPP
    # ======================================

    location = /images/logos/ethicapp-logo.svg {
      proxy_pass http://ethicapp_upstream/images/logos/ethicapp-logo.svg;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location = /auth/images/logos/ethicapp-logo.svg {
      proxy_pass http://ethicapp_upstream/images/logos/ethicapp-logo.svg;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location = /student/images/logos/ethicapp-logo.svg {
      proxy_pass http://ethicapp_upstream/images/logos/ethicapp-logo.svg;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location = /mng/images/logos/ethicapp-logo.svg {
      proxy_pass http://ethicapp_upstream/images/logos/ethicapp-logo.svg;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location ~ ^/(auth|student|mng)/images/logos/ethicapp-logo\.svg$ {
      rewrite ^/(?:auth|student|mng)/images/logos/ethicapp-logo\.svg$ /images/logos/ethicapp-logo.svg break;
      proxy_pass http://ethicapp_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    # ======================================
    # AUTH FRONTEND (Vite dev server)
    # Canonical base: /auth
    # Root (/) still opens auth frontend
    # ======================================

    location = / {
      return 302 /auth/;
    }

    location = /auth {
      return 302 /auth/;
    }

    # Backward-compatible redirects for old bare auth routes
    location ~ ^/(login|logout|register|forgot|reset-password|privacy)$ {
      return 302 /auth$uri;
    }

    # Everything under /auth/... goes to Vite dev server
    # after stripping the /auth prefix.
    location = /auth/runtime-config.js {
      rewrite ^/auth/runtime-config\.js$ /runtime-config.js break;
      proxy_pass http://auth_frontend;
      proxy_http_version 1.1;
      add_header Cache-Control "no-store";
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    location ^~ /auth/ {
      # rewrite ^/auth(/.*)$ $1 break;

      proxy_pass http://auth_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    # ======================================
    # AUTH API
    # ======================================

    location /api/auth/ {
      proxy_pass http://auth_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    # ======================================
    # INTERNAL AUTH CHECK
    # ======================================

    location = /_auth_check {
      internal;

      proxy_pass http://auth_api/auth/session/check;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";

      proxy_set_header Host $host;
      proxy_set_header X-Original-URI $request_uri;
      proxy_set_header X-Original-Method $request_method;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
      proxy_set_header Cookie $http_cookie;
    }

    auth_request_set $auth_user_id $upstream_http_x_user_id;
    auth_request_set $auth_user_role $upstream_http_x_user_role;

    # ======================================
    # ETHICAPP LEGACY (protected)
    # ======================================

    location = /student/runtime-config.js {
      proxy_pass http://ethicapp_student_frontend;
      proxy_http_version 1.1;
      add_header Cache-Control "no-store";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    location /student/api/ {
      auth_request /_auth_check;
      error_page 401 = @auth_redirect;

      proxy_pass http://ethicapp_student_api;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

      proxy_set_header X-User-Id $auth_user_id;
      proxy_set_header X-User-Role $auth_user_role;
    }

    location /student/ {
      auth_request /_auth_check;
      error_page 401 = @auth_redirect;

      proxy_pass http://ethicapp_student_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

      proxy_set_header X-User-Id $auth_user_id;
      proxy_set_header X-User-Role $auth_user_role;
    }

    location /socket.io/ {
      auth_request /_auth_check;
      error_page 401 = @auth_redirect;

      proxy_pass http://ethicapp_upstream;
      proxy_http_version 1.1;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

      proxy_set_header X-User-Id $auth_user_id;
      proxy_set_header X-User-Role $auth_user_role;
    }

    location /public/ {
      auth_request /_auth_check;
      error_page 401 = @auth_redirect;

      proxy_pass http://ethicapp_upstream;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

      proxy_set_header X-User-Id $auth_user_id;
      proxy_set_header X-User-Role $auth_user_role;
    }

    location /uploads/ {
      auth_request /_auth_check;
      error_page 401 = @auth_redirect;

      proxy_pass http://ethicapp_upstream;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

      proxy_set_header X-User-Id $auth_user_id;
      proxy_set_header X-User-Role $auth_user_role;
    }

    location = /mng {
      return 302 /mng/;
    }

    location = /mng/runtime-config.js {
      auth_request /_auth_check;
      error_page 401 = @auth_redirect;
      error_page 403 = @forbidden;

      proxy_pass http://management_console_api;
      proxy_http_version 1.1;
      add_header Cache-Control "no-store";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

      proxy_set_header X-User-Id $auth_user_id;
      proxy_set_header X-User-Role $auth_user_role;
    }

    location /mng/api/ {
      auth_request /_auth_check;
      error_page 401 = @auth_redirect;
      error_page 403 = @forbidden;


      proxy_pass http://management_console_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

      proxy_set_header X-User-Id $auth_user_id;
      proxy_set_header X-User-Role $auth_user_role;
    }

    location /mng/ {
      auth_request /_auth_check;
      error_page 401 = @auth_redirect;
      error_page 403 = @forbidden;


      proxy_pass http://management_console_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

      proxy_set_header X-User-Id $auth_user_id;
      proxy_set_header X-User-Role $auth_user_role;
    }

    # Catch-all for legacy routes, excluding / and /auth...
    location / {
      auth_request /_auth_check;
      error_page 401 = @auth_redirect;

      proxy_pass http://ethicapp_upstream;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

      proxy_set_header X-User-Id $auth_user_id;
      proxy_set_header X-User-Role $auth_user_role;
    }

    location @auth_redirect {
      return 302 /auth/login;
    }

    location @forbidden {
      return 403;
    }
  }
}
