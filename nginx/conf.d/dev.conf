worker_processes 1;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream auth_api {
    server auth-backend:8502;
  }

  upstream auth_frontend {
    server auth-backend:5173;
  }

  upstream ethicapp_upstream {
    server ethicapp:8501;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # ======================================
    # AUTH FRONTEND (Vite dev server)
    # ======================================

    location = / {
      proxy_pass http://auth_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location /favicon/ {
      proxy_pass http://auth_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location = /site.webmanifest {
      proxy_pass http://auth_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location ~ ^/(login|register|forgot|reset-password|privacy)$ {
      proxy_pass http://auth_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location /assets/ {
      proxy_pass http://auth_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location /src/ {
      proxy_pass http://auth_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location /node_modules/ {
      proxy_pass http://auth_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location /@vite/ {
      proxy_pass http://auth_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location /@react-refresh {
      proxy_pass http://auth_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location = /favicon.ico {
      proxy_pass http://auth_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location = /favicon.svg {
      proxy_pass http://auth_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location = /vite.svg {
      proxy_pass http://auth_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    # ======================================
    # AUTH API
    # ======================================

    location /api/auth/ {
      proxy_pass http://auth_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ======================================
    # INTERNAL AUTH CHECK
    # ======================================

    location = /_auth_check {
      internal;

      proxy_pass http://auth_api/auth/session/check;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";

      proxy_set_header Host $host;
      proxy_set_header X-Original-URI $request_uri;
      proxy_set_header X-Original-Method $request_method;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Cookie $http_cookie;
    }

    auth_request_set $auth_user_id $upstream_http_x_user_id;
    auth_request_set $auth_user_role $upstream_http_x_user_role;

    # ======================================
    # ETHICAPP LEGACY (protegido)
    # ======================================

    location /socket.io/ {
      auth_request /_auth_check;
      error_page 401 = @auth_redirect;

      proxy_pass http://ethicapp_upstream;
      proxy_http_version 1.1;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_set_header X-User-Id $auth_user_id;
      proxy_set_header X-User-Role $auth_user_role;
    }

    location /public/ {
      auth_request /_auth_check;
      error_page 401 = @auth_redirect;

      proxy_pass http://ethicapp_upstream;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_set_header X-User-Id $auth_user_id;
      proxy_set_header X-User-Role $auth_user_role;
    }

    location /uploads/ {
      auth_request /_auth_check;
      error_page 401 = @auth_redirect;

      proxy_pass http://ethicapp_upstream;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_set_header X-User-Id $auth_user_id;
      proxy_set_header X-User-Role $auth_user_role;
    }

    location / {
      auth_request /_auth_check;
      error_page 401 = @auth_redirect;

      proxy_pass http://ethicapp_upstream;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_set_header X-User-Id $auth_user_id;
      proxy_set_header X-User-Role $auth_user_role;
    }

    location @auth_redirect {
      return 302 /login;
    }
  }
}