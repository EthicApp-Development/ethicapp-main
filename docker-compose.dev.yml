version: '3.8'

services:
  auth-backend:
    environment:
      - NODE_ENV=development
      - PORT=8502
      - PGUSER=postgres
      - PGPORT=5432
      - PGPASSWORD=postgres
      - PGSSLMODE=disable
      - POSTGRES_DB=ethicapp
      - PGHOST=postgresql
      - TRUST_PROXY=1
      - SESSION_COOKIE_NAME=auth.sid
      - SESSION_SECRET=${SESSION_SECRET}
      - CREATE_ADMIN=true
      - SEED_USERS=true
      - WAIT_FOR_DB=true
    volumes:
      - ./auth-backend:/app
      - auth_backend_node_modules:/app/node_modules
      - auth_frontend_node_modules:/app/frontend/node_modules
    command: >
      sh -c "
        npm install &&
        cd frontend && npm install &&
        cd /app &&
        npx nodemon server.js &
        cd frontend && npx vite --host 0.0.0.0 --port 5173
      "
    expose:
      - "8502"
      - "5173"

  nginx:
    volumes:
      - ./nginx/conf.d/dev.conf:/etc/nginx/nginx.conf:ro

volumes:
  auth_backend_node_modules:
  auth_frontend_node_modules: