version: 1
name: ethicapp-environment-contract
description: >
  Canonical environment-variable contract for EthicApp. Deployment repositories
  should consume this file from the same git tag as the Docker images being
  deployed, then provide environment-specific values and secrets.

policies:
  locales:
    supported:
      - es_CL
      - en_US
    normalization: "es or es_* resolves to es_CL; every other locale resolves to en_US."
  public_frontend_variables:
    prefix: VITE_
    secret: false
    build_strategy: runtime-config-js
    warning: "VITE_* values are public and are emitted into runtime-config.js when containers start."
  production:
    disallow_placeholder_values:
      - "..."
      - "change-this-in-production"
      - "ChangeMeNow!!"
      - "place_holder_secret_key"
      - "super_secret_password"

services:
  root:
    description: Repository-level Compose and shared runtime settings.
  nginx:
    description: Public reverse proxy and maintenance-mode static page server.
  shared:
    description: Variables shared by multiple backend services.
  ethicapp:
    description: Legacy EthicApp Express and AngularJS application.
  external-mock-service:
    description: Development and PoC external service used by EthicApp external-service adapters for response review and chat-agent callbacks.
  ethicapp-pdf-worker:
    description: Background worker that renders protected uploaded PDFs into derived page images.
  management-console-student-anonymization:
    description: One-shot maintenance job that deactivates and anonymizes legacy student accounts and free-text student responses.
  production-backup:
    description: Host-level production PostgreSQL and protected uploads backup and restore scripts with rotating retention.
  auth-backend:
    description: Authentication service and React authentication frontend.
  ethicapp-student:
    description: Student-facing React and Express application.
  management-console:
    description: Super-admin management application.
  database:
    description: PostgreSQL container initialization settings.

variables:
  NODE_ENV:
    type: enum
    values: [development, production, test]
    required: true
    secret: false
    default:
      development: development
      production: production
    services: [root, ethicapp, auth-backend, ethicapp-student, management-console]
    phase: runtime
    description: Runtime mode used by Node services and cookie security defaults.

  ETHICAPP_WATCH_FRONTEND:
    type: boolean
    required: false
    secret: false
    default:
      development: true
    services: [root, ethicapp]
    phase: runtime
    description: Enables the legacy frontend asset watcher in development.

  NGINX_MAINTENANCE_MODE:
    type: boolean
    required: false
    secret: false
    default: false
    services: [root, nginx]
    phase: runtime
    description: Starts NGINX with the static maintenance page instead of proxying application routes.

  NGINX_MAINTENANCE_RETRY_AFTER:
    type: string
    required: false
    secret: false
    default: "3600"
    services: [root, nginx]
    phase: runtime
    description: Retry-After header value emitted with maintenance responses.

  STUDENT_ANONYMIZATION_WINDOW_SCHEDULE:
    type: string
    required: false
    secret: false
    default: "01-01,07-01"
    services: [root, management-console-student-anonymization]
    phase: runtime
    description: Deployment-configurable maintenance window schedule metadata for student anonymization. Defaults to January 1 and July 1 but should be set by the deployment scheduler.

  STUDENT_ANONYMIZATION_WINDOW_TIMEZONE:
    type: string
    required: false
    secret: false
    default: deployment-local
    services: [root, management-console-student-anonymization]
    phase: runtime
    description: Timezone used by operators or deployment schedulers for the configured student anonymization window dates.

  BACKUP_DIR:
    type: string
    required: false
    secret: false
    default: /var/backups/ethicapp
    services: [production-backup]
    phase: runtime
    description: Host directory where production PostgreSQL and uploads backup artifacts are written.

  BACKUP_PREFIX:
    type: string
    required: false
    secret: false
    default: ethicapp
    services: [production-backup]
    phase: runtime
    description: Filename prefix for production backup artifacts. Must contain only letters, numbers, dot, underscore, or hyphen.

  BACKUP_RETENTION_COUNT:
    type: integer
    required: false
    secret: false
    default: 7
    services: [production-backup]
    phase: runtime
    description: Number of script-created production backup sets to keep after each successful backup.

  BACKUP_DB_CONTAINER:
    type: string
    required: false
    secret: false
    services: [production-backup]
    phase: runtime
    description: Optional PostgreSQL container name used by production backup and restore scripts for docker exec mode. Leave unset when host PostgreSQL client tools connect directly.

  BACKUP_UPLOADS:
    type: boolean
    required: false
    secret: false
    default: true
    services: [production-backup]
    phase: runtime
    description: Includes the protected uploads filesystem path in production backup sets.

  RESTORE_UPLOADS:
    type: boolean
    required: false
    secret: false
    default: true
    services: [production-backup]
    phase: runtime
    description: Restores the matching protected uploads archive when running the production restore script.

  RESTORE_UPLOADS_REPLACE:
    type: boolean
    required: false
    secret: false
    default: true
    services: [production-backup]
    phase: runtime
    description: Clears the target uploads path before extracting the restored uploads archive.

  ETHICAPP_SEED_TAG_TAXONOMIES:
    type: boolean
    required: false
    secret: false
    default: true
    services: [ethicapp]
    phase: runtime
    description: Runs the idempotent semantic tag taxonomy seed before EthicApp starts.

  ETHICAPP_SEED_TAG_TAXONOMIES_ATTEMPTS:
    type: integer
    required: false
    secret: false
    default: 12
    services: [ethicapp]
    phase: runtime
    description: Number of startup retry attempts for the semantic tag taxonomy seed.

  ETHICAPP_TAG_TAXONOMY_SEED_DIR:
    type: string
    required: false
    secret: false
    default: /database/seeds/tag-taxonomies
    services: [ethicapp]
    phase: runtime
    description: Directory containing semantic tag taxonomy JSON seed files.

  TRUST_PROXY:
    type: integer
    required: false
    secret: false
    default: 1
    services: [shared, auth-backend, ethicapp, ethicapp-student, management-console]
    phase: runtime
    description: Express trust proxy setting when services are behind NGINX or another proxy.

  PGHOST:
    type: string
    required: true
    secret: false
    default: postgresql
    services: [shared, production-backup, auth-backend, ethicapp-pdf-worker, management-console-student-anonymization, ethicapp-student, management-console]
    phase: runtime
    description: PostgreSQL host.

  PGPORT:
    type: integer
    required: true
    secret: false
    default: 5432
    services: [shared, production-backup, auth-backend, ethicapp-pdf-worker, management-console-student-anonymization, ethicapp-student, management-console]
    phase: runtime
    description: PostgreSQL port.

  PGUSER:
    type: string
    required: true
    secret: false
    default: postgres
    services: [shared, production-backup, auth-backend, ethicapp-pdf-worker, management-console-student-anonymization, ethicapp-student, management-console]
    phase: runtime
    description: PostgreSQL user.

  PGPASSWORD:
    type: secret
    required: true
    secret: true
    services: [shared, production-backup, auth-backend, ethicapp-pdf-worker, management-console-student-anonymization, ethicapp-student, management-console]
    phase: runtime
    description: PostgreSQL password.

  PGDATABASE:
    type: string
    required: true
    secret: false
    default: ethicapp
    services: [shared, production-backup, auth-backend, ethicapp-pdf-worker, management-console-student-anonymization, ethicapp-student, management-console]
    phase: runtime
    description: PostgreSQL database name.

  POSTGRES_DB:
    type: string
    required: false
    secret: false
    services: [database, auth-backend, ethicapp-pdf-worker, management-console-student-anonymization, ethicapp-student, management-console]
    phase: runtime
    description: PostgreSQL image database name and fallback database variable in app configs.

  POSTGRES_USER:
    type: string
    required: false
    secret: false
    services: [database]
    phase: runtime
    description: PostgreSQL image initialization user.

  POSTGRES_PASSWORD:
    type: secret
    required: false
    secret: true
    services: [database]
    phase: runtime
    description: PostgreSQL image initialization password.

  PGSSLMODE:
    type: enum
    values: [disable, require]
    required: false
    secret: false
    default: disable
    services: [shared, production-backup, auth-backend, ethicapp-pdf-worker, management-console-student-anonymization, ethicapp-student, management-console]
    phase: runtime
    description: PostgreSQL SSL mode.

  PGPOOL_MAX:
    type: integer
    required: false
    secret: false
    default: 10
    services: [shared, auth-backend, ethicapp-pdf-worker, management-console-student-anonymization, ethicapp-student, management-console]
    phase: runtime
    description: Maximum PostgreSQL pool size per service.

  PG_IDLE_TIMEOUT:
    type: integer
    required: false
    secret: false
    default: 30000
    services: [shared, auth-backend, ethicapp-pdf-worker, management-console-student-anonymization, ethicapp-student, management-console]
    phase: runtime
    description: PostgreSQL pool idle timeout in milliseconds.

  PG_CONN_TIMEOUT:
    type: integer
    required: false
    secret: false
    default: 2000
    services: [shared, auth-backend, ethicapp-pdf-worker, management-console-student-anonymization, ethicapp-student, management-console]
    phase: runtime
    description: PostgreSQL connection timeout in milliseconds.

  DEBUG_SQL:
    type: boolean
    required: false
    secret: false
    default: false
    services: [shared, auth-backend, ethicapp-pdf-worker, management-console-student-anonymization, ethicapp-student]
    phase: runtime
    description: Enables SQL debug logging.

  DATABASE_URL:
    type: secret
    required: false
    secret: true
    services: [ethicapp, ethicapp-pdf-worker]
    phase: runtime
    description: Optional legacy EthicApp database connection string override.

  DB_CONNECTION_STRING:
    type: secret
    required: false
    secret: true
    services: [ethicapp, ethicapp-pdf-worker]
    phase: runtime
    description: Legacy fallback database connection string for EthicApp scripts and workers.

  REDIS_SESSION_HOST:
    type: string
    required: true
    secret: false
    default: redis-session
    services: [shared, ethicapp, auth-backend]
    phase: runtime
    description: Redis host dedicated to Express session storage. Production deployments must provide a redis-session service or equivalent DNS name.

  REDIS_SESSION_PORT:
    type: integer
    required: false
    secret: false
    default: 6379
    services: [shared, ethicapp, auth-backend]
    phase: runtime
    description: Redis port dedicated to Express session storage.

  REDIS_SESSION_URL:
    type: secret
    required: false
    secret: true
    services: [ethicapp, auth-backend]
    phase: runtime
    description: Optional Redis session URL override, useful when the session Redis requires credentials or TLS.

  REDIS_SESSION_MAXMEMORY:
    type: string
    required: false
    secret: false
    default: 128mb
    services: [shared]
    phase: runtime
    description: Max memory limit for the Redis instance dedicated to Express sessions.

  REDIS_SESSION_MAXMEMORY_POLICY:
    type: enum
    values: [noeviction, allkeys-lru, volatile-lru, allkeys-random, volatile-random, volatile-ttl, volatile-lfu, allkeys-lfu]
    required: false
    secret: false
    default: volatile-ttl
    services: [shared]
    phase: runtime
    description: Eviction policy for the Redis instance dedicated to Express sessions.

  REDIS_CACHE_HOST:
    type: string
    required: true
    secret: false
    default: redis-cache
    services: [shared, ethicapp]
    phase: runtime
    description: Redis host dedicated to database-derived cache entries. Production deployments must provide a redis-cache service or equivalent DNS name.

  REDIS_CACHE_PORT:
    type: integer
    required: false
    secret: false
    default: 6379
    services: [shared, ethicapp]
    phase: runtime
    description: Redis port dedicated to database-derived cache entries.

  REDIS_CACHE_URL:
    type: secret
    required: false
    secret: true
    services: [ethicapp]
    phase: runtime
    description: Optional Redis cache URL override, useful when the cache Redis requires credentials or TLS.

  REDIS_CACHE_MAXMEMORY:
    type: string
    required: false
    secret: false
    default: 256mb
    services: [shared]
    phase: runtime
    description: Max memory limit for the Redis instance dedicated to database-derived cache entries.

  REDIS_CACHE_MAXMEMORY_POLICY:
    type: enum
    values: [noeviction, allkeys-lru, volatile-lru, allkeys-random, volatile-random, volatile-ttl, volatile-lfu, allkeys-lfu]
    required: false
    secret: false
    default: allkeys-lru
    services: [shared]
    phase: runtime
    description: Eviction policy for the Redis instance dedicated to database-derived cache entries.

  SESSION_SECRET:
    type: secret
    required: true
    secret: true
    services: [ethicapp, ethicapp-student, management-console]
    phase: runtime
    description: Shared fallback session signing secret. Prefer service-specific secrets where available.

  ETHICAPP_NODE_PORT:
    type: integer
    required: false
    secret: false
    default: 8501
    services: [ethicapp, nginx]
    phase: runtime
    description: Legacy EthicApp HTTP port. NGINX uses this value for the internal EthicApp upstream.

  ETHICAPP_SESSION_COOKIE_NAME:
    type: string
    required: false
    secret: false
    default: ethicapp.sid
    services: [ethicapp]
    phase: runtime
    description: Legacy EthicApp session cookie name.

  ETHICAPP_SESSION_COOKIE_SAMESITE:
    type: enum
    values: [lax, strict, none]
    required: false
    secret: false
    default: lax
    services: [ethicapp]
    phase: runtime
    description: Legacy EthicApp session cookie SameSite policy.

  ETHICAPP_SESSION_COOKIE_SECURE:
    type: boolean
    required: false
    secret: false
    default:
      production: true
      development: false
    services: [ethicapp]
    phase: runtime
    description: Whether the legacy EthicApp session cookie requires HTTPS.

  ETHICAPP_SESSION_COOKIE_MAX_AGE_MS:
    type: integer
    required: false
    secret: false
    default: 86400000
    services: [ethicapp]
    phase: runtime
    description: Legacy EthicApp session cookie max age in milliseconds.

  ETHICAPP_SESSION_TTL_SECONDS:
    type: integer
    required: false
    secret: false
    default: 86400
    services: [ethicapp]
    phase: runtime
    description: Redis TTL for legacy EthicApp sessions.

  ETHICAPP_SESSION_REDIS_PREFIX:
    type: string
    required: false
    secret: false
    default: "ethicapp:sess:"
    services: [ethicapp]
    phase: runtime
    description: Redis key prefix for legacy EthicApp sessions.

  ATS_API_BASE_URL:
    type: url
    required: false
    secret: false
    default:
      development: "http://host.docker.internal:5001"
    services: [ethicapp]
    phase: runtime
    description: Base URL for the Argumentation Tutor System API used by the external-services ATS adapter to create sessions, submit arguments, poll feedback tasks, and delete ATS sessions.

  ATS_POLL_INTERVAL_MS:
    type: integer
    required: false
    secret: false
    default: 2500
    services: [ethicapp]
    phase: runtime
    description: Delay between ATS task status polling attempts while waiting for argument feedback.

  ATS_POLL_TIMEOUT_MS:
    type: integer
    required: false
    secret: false
    default: 90000
    services: [ethicapp]
    phase: runtime
    description: Maximum total wait time for an ATS feedback task before the adapter reports a timeout.

  ATS_HTTP_TIMEOUT_MS:
    type: integer
    required: false
    secret: false
    default: 12000
    services: [ethicapp]
    phase: runtime
    description: Per-request HTTP timeout for ATS API and Keycloak token requests.

  ATS_KEYCLOAK_BASE_URL:
    type: url
    required: false
    secret: false
    default:
      development: "http://host.docker.internal:8080"
    services: [ethicapp]
    phase: runtime
    description: Base URL for the Keycloak server that issues client-credentials access tokens for ATS API calls.

  ATS_KEYCLOAK_REALM:
    type: string
    required: false
    secret: false
    default: argumentation-tutor
    services: [ethicapp]
    phase: runtime
    description: Keycloak realm used to derive the ATS token endpoint when ATS_KEYCLOAK_TOKEN_URL is not provided.

  ATS_KEYCLOAK_CLIENT_ID:
    type: string
    required: false
    secret: false
    services: [ethicapp]
    phase: runtime
    description: Keycloak client id used by the ATS adapter for client-credentials authentication. Required when the Argumentation Tutor System adapter is enabled and used.

  ATS_KEYCLOAK_CLIENT_SECRET:
    type: secret
    required: false
    secret: true
    services: [ethicapp]
    phase: runtime
    description: Keycloak client secret used by the ATS adapter for client-credentials authentication. Required when the Argumentation Tutor System adapter is enabled and used.

  ATS_KEYCLOAK_TOKEN_URL:
    type: url
    required: false
    secret: false
    services: [ethicapp]
    phase: runtime
    description: Optional explicit Keycloak token endpoint for ATS authentication. When unset, the adapter derives it from ATS_KEYCLOAK_BASE_URL and ATS_KEYCLOAK_REALM.

  ATS_KEYCLOAK_SCOPE:
    type: string
    required: false
    secret: false
    services: [ethicapp]
    phase: runtime
    description: Optional OAuth scope sent in ATS Keycloak client-credentials token requests.

  EXTERNAL_MOCK_SERVICE_URL:
    type: url
    required: false
    secret: false
    default:
      development: "http://external-mock-service:8510"
    services: [ethicapp]
    phase: runtime
    description: Internal URL used by EthicApp mock external-service adapters to call the repository-provided external mock service for response review and chat-agent replies.

  EXTERNAL_SERVICES_MANIFEST:
    type: path
    required: false
    secret: false
    default: /app/backend/external-services/manifest.json
    services: [ethicapp]
    phase: runtime
    description: Optional path override for the EthicApp external-services manifest that selects which external-service adapters, including mock adapters, are loaded at startup.

  ETHICAPP_PROCESS_ROLE:
    type: enum
    values: [web, pdf-render-worker]
    required: false
    secret: false
    default: web
    services: [production-backup, ethicapp, ethicapp-pdf-worker]
    phase: runtime
    description: Selects the process started from the EthicApp image entrypoint.

  MNG_PROCESS_ROLE:
    type: enum
    values: [web, student-anonymization]
    required: false
    secret: false
    default: web
    services: [management-console, management-console-student-anonymization]
    phase: runtime
    description: Selects the process started from the management-console image entrypoint.

  STUDENT_ANONYMIZATION_DRY_RUN:
    type: boolean
    required: false
    secret: false
    default: false
    services: [management-console-student-anonymization]
    phase: runtime
    description: Runs the student anonymization job in audit-only mode without modifying user or response data.

  STUDENT_ANONYMIZATION_PLACEHOLDER_TEXT:
    type: string
    required: false
    secret: false
    default: "******"
    services: [management-console-student-anonymization]
    phase: runtime
    description: Replacement text written into anonymized student free-text response fields.

  STUDENT_ANONYMIZATION_TRIGGERED_BY:
    type: string
    required: false
    secret: false
    services: [management-console-student-anonymization]
    phase: runtime
    description: Optional operator or scheduler label recorded in the anonymization run audit row.

  STUDENT_ANONYMIZATION_PROCESS_NAME:
    type: string
    required: false
    secret: false
    default: student-anonymization-job
    services: [management-console-student-anonymization]
    phase: runtime
    description: Process name recorded in the anonymization run audit row.

  PDF_RENDER_WORKER_CONCURRENCY:
    type: integer
    required: false
    secret: false
    default: 1
    services: [ethicapp-pdf-worker]
    phase: runtime
    description: Number of PDF render jobs processed concurrently by each worker instance.

  PDF_RENDER_WORKER_POLL_INTERVAL_MS:
    type: integer
    required: false
    secret: false
    default: 2000
    services: [ethicapp-pdf-worker]
    phase: runtime
    description: Delay between worker polling attempts when no PDF render job is available.

  PDF_RENDER_DPI:
    type: integer
    required: false
    secret: false
    default: 200
    services: [ethicapp-pdf-worker]
    phase: runtime
    description: Target DPI for generated PDF page images.

  PDF_RENDER_MAX_PAGES:
    type: integer
    required: false
    secret: false
    default: 50
    services: [ethicapp-pdf-worker]
    phase: runtime
    description: Maximum PDF page count the worker should render before failing a job.

  PDF_RENDER_TIMEOUT_MS:
    type: integer
    required: false
    secret: false
    default: 120000
    services: [ethicapp-pdf-worker]
    phase: runtime
    description: Maximum render command runtime per job in milliseconds.

  ETHICAPP_INTERNAL_BASE_URL:
    type: url
    required: true
    secret: false
    default: "http://ethicapp:8501"
    services: [management-console]
    phase: runtime
    description: Internal URL used by management-console to call legacy EthicApp.

  UPLOADS_PATH:
    type: path
    required: false
    secret: false
    default: /app/backend/uploads
    services: [production-backup, ethicapp, ethicapp-pdf-worker]
    phase: runtime
    description: Legacy EthicApp upload storage path inside the container, shared with the PDF render worker.

  ALLOWED_ORIGINS:
    type: csv
    required: false
    secret: false
    services: [ethicapp]
    phase: runtime
    status: legacy-commented
    description: Legacy CORS origin list currently not active in app bootstrap.

  CANONICAL_SEED_OWNER_EMAIL:
    type: email
    required: false
    secret: false
    default: profesor@test
    services: [ethicapp]
    phase: job
    description: Owner email used by canonical activity seed scripts.

  PORT:
    type: integer
    required: false
    secret: false
    default: 8502
    services: [auth-backend, nginx]
    phase: runtime
    description: Auth backend HTTP port. NGINX uses this value for the internal auth-backend upstream.

  AUTH_PUBLIC_URL:
    type: url
    required: true
    secret: false
    services: [auth-backend]
    phase: runtime
    description: Public auth URL used in generated links and emails.

  AUTH_BACKEND_INTERNAL_BASE_URL:
    type: url
    required: true
    secret: false
    default: "http://auth-backend:8502/api/auth"
    services: [management-console]
    phase: runtime
    description: Internal URL used by management-console to call auth-backend.

  AUTH_INTERNAL_SERVICE_TOKEN:
    type: secret
    required: true
    secret: true
    services: [auth-backend, management-console]
    phase: runtime
    description: Shared secret used by management-console for CSRF-exempt server-to-server calls into auth-backend. Must match in both services.

  AUTH_SESSION_SECRET:
    type: secret
    required: true
    secret: true
    services: [auth-backend]
    phase: runtime
    description: Auth backend session signing secret. Falls back to SESSION_SECRET for legacy deployments, but production deployments should provide this service-specific value.

  AUTH_COOKIE_NAME:
    type: string
    required: false
    secret: false
    default: connect.sid
    services: [auth-backend]
    phase: runtime
    description: Legacy auth-route cookie name used by selected auth controller code.

  SESSION_COOKIE_NAME:
    type: string
    required: false
    secret: false
    default: auth.sid
    services: [auth-backend]
    phase: runtime
    description: Auth backend session cookie name.

  SESSION_COOKIE_SAMESITE:
    type: enum
    values: [lax, strict, none]
    required: false
    secret: false
    default: lax
    services: [auth-backend]
    phase: runtime
    description: Auth backend session cookie SameSite policy.

  SESSION_COOKIE_SECURE:
    type: boolean
    required: false
    secret: false
    default:
      production: true
      development: false
    services: [auth-backend]
    phase: runtime
    description: Whether auth backend cookies require HTTPS.

  AUTH_SESSION_COOKIE_MAX_AGE_MS:
    type: integer
    required: false
    secret: false
    default: 2592000000
    services: [auth-backend]
    phase: runtime
    description: Auth backend opaque session cookie upper-bound lifetime in milliseconds. Defaults to the longest role absolute timeout; role-aware idle, absolute, and session-version checks may invalidate sessions earlier.

  AUTH_SESSION_TTL_SECONDS:
    type: integer
    required: false
    secret: false
    default: 2592000
    services: [auth-backend]
    phase: runtime
    description: Redis TTL for auth backend opaque sessions. Defaults to the longest role absolute timeout; role-aware idle, absolute, and session-version checks may invalidate sessions earlier.

  AUTH_SESSION_REDIS_PREFIX:
    type: string
    required: false
    secret: false
    default: "auth:sess:"
    services: [auth-backend]
    phase: runtime
    description: Redis key prefix for auth backend sessions.

  AUTH_SESSION_ADMIN_IDLE_TIMEOUT_MS:
    type: integer
    required: false
    secret: false
    default: 7200000
    services: [auth-backend]
    phase: runtime
    description: Sliding idle timeout in milliseconds for administrator browser auth sessions.

  AUTH_SESSION_ADMIN_ABSOLUTE_TIMEOUT_MS:
    type: integer
    required: false
    secret: false
    default: 28800000
    services: [auth-backend]
    phase: runtime
    description: Non-sliding absolute timeout in milliseconds for administrator browser auth sessions.

  AUTH_SESSION_PROFESSOR_IDLE_TIMEOUT_MS:
    type: integer
    required: false
    secret: false
    default: 604800000
    services: [auth-backend]
    phase: runtime
    description: Sliding idle timeout in milliseconds for professor browser auth sessions.

  AUTH_SESSION_PROFESSOR_ABSOLUTE_TIMEOUT_MS:
    type: integer
    required: false
    secret: false
    default: 2592000000
    services: [auth-backend]
    phase: runtime
    description: Non-sliding absolute timeout in milliseconds for professor browser auth sessions.

  AUTH_SESSION_STUDENT_IDLE_TIMEOUT_MS:
    type: integer
    required: false
    secret: false
    default: 86400000
    services: [auth-backend]
    phase: runtime
    description: Sliding idle timeout in milliseconds for student browser auth sessions.

  AUTH_SESSION_STUDENT_ABSOLUTE_TIMEOUT_MS:
    type: integer
    required: false
    secret: false
    default: 604800000
    services: [auth-backend]
    phase: runtime
    description: Non-sliding absolute timeout in milliseconds for student browser auth sessions.

  AUTH_SESSION_TOUCH_INTERVAL_MS:
    type: integer
    required: false
    secret: false
    default: 300000
    services: [auth-backend]
    phase: runtime
    description: Minimum interval in milliseconds between sliding-session touches. Effective value is capped at half of the role idle timeout.

  BCRYPT_SALT_ROUNDS:
    type: integer
    required: false
    secret: false
    default: 10
    services: [auth-backend]
    phase: runtime
    description: Password hashing cost.

  RESET_TOKEN_TTL_MINUTES:
    type: integer
    required: false
    secret: false
    default: 60
    services: [auth-backend]
    phase: runtime
    description: Password reset token lifetime in minutes.

  WEBAUTHN_RP_NAME:
    type: string
    required: false
    secret: false
    default: EthicApp
    services: [auth-backend]
    phase: runtime
    description: WebAuthn relying party display name shown by passkey authenticators.

  WEBAUTHN_RP_ID:
    type: hostname
    required: true
    secret: false
    services: [auth-backend]
    phase: runtime
    description: WebAuthn relying party ID. It must match the public application domain, without scheme or port.

  WEBAUTHN_ORIGIN:
    type: url
    required: true
    secret: false
    services: [auth-backend]
    phase: runtime
    description: Public browser origin allowed for WebAuthn registration responses.

  WEBAUTHN_REGISTRATION_TIMEOUT_MS:
    type: integer
    required: false
    secret: false
    default: 60000
    services: [auth-backend]
    phase: runtime
    description: WebAuthn passkey registration challenge timeout in milliseconds.

  WEBAUTHN_AUTHENTICATION_TIMEOUT_MS:
    type: integer
    required: false
    secret: false
    default: 60000
    services: [auth-backend]
    phase: runtime
    description: WebAuthn passkey confirmation challenge timeout in milliseconds.

  CREATE_ADMIN:
    type: boolean
    required: false
    secret: false
    default: false
    services: [auth-backend]
    phase: job
    description: Enables bootstrap administrator creation.

  SEED_USERS:
    type: boolean
    required: false
    secret: false
    default: false
    services: [auth-backend]
    phase: job
    description: Enables development or test user seeding.

  WAIT_FOR_DB:
    type: boolean
    required: false
    secret: false
    default: true
    services: [auth-backend]
    phase: runtime
    description: Makes auth-backend wait for PostgreSQL before bootstrapping.

  ADMIN_FIRSTNAME:
    type: string
    required_when:
      CREATE_ADMIN: true
    secret: false
    services: [auth-backend]
    phase: job
    description: Bootstrap administrator first name.

  ADMIN_LASTNAME:
    type: string
    required_when:
      CREATE_ADMIN: true
    secret: false
    services: [auth-backend]
    phase: job
    description: Bootstrap administrator last name.

  ADMIN_DNI:
    type: string
    required_when:
      CREATE_ADMIN: true
    secret: false
    services: [auth-backend]
    phase: job
    description: Bootstrap administrator DNI/RUT.

  ADMIN_EMAIL:
    type: email
    required_when:
      CREATE_ADMIN: true
    secret: false
    services: [auth-backend]
    phase: job
    description: Bootstrap administrator email.

  ADMIN_PASSWORD:
    type: secret
    required_when:
      CREATE_ADMIN: true
    secret: true
    services: [auth-backend]
    phase: job
    description: Bootstrap administrator password.

  ADMIN_SEX:
    type: enum
    values: [M, F, O]
    required_when:
      CREATE_ADMIN: true
    secret: false
    default: M
    services: [auth-backend]
    phase: job
    description: Bootstrap administrator profile sex value.

  SMTP_HOST:
    type: hostname
    required: true
    secret: false
    services: [shared, auth-backend]
    phase: runtime
    description: SMTP host for auth-backend email delivery.

  SMTP_PORT:
    type: integer
    required: false
    secret: false
    default: 465
    services: [shared, auth-backend]
    phase: runtime
    description: SMTP server port. Use 465 with SMTP_SECURE=true, or 587 with STARTTLS.

  SMTP_SECURE:
    type: boolean
    required: false
    secret: false
    default: true
    services: [shared, auth-backend]
    phase: runtime
    description: Enables implicit TLS for SMTP. Should be true when using port 465.

  SMTP_USER:
    type: string
    required: true
    secret: false
    services: [shared, auth-backend]
    phase: runtime
    description: SMTP username.

  SMTP_PASS:
    type: secret
    required: true
    secret: true
    services: [shared, auth-backend]
    phase: runtime
    description: SMTP password.

  SMTP_FROM:
    type: string
    required: true
    secret: false
    services: [shared, auth-backend]
    phase: runtime
    description: Email sender identity.

  RECAPTCHA_ENABLED:
    type: boolean
    required: false
    secret: false
    default: true
    services: [shared, auth-backend, ethicapp, management-console]
    phase: runtime
    description: Enables server-side reCAPTCHA checks.

  RECAPTCHA_SECRET_KEY:
    type: secret
    required_when:
      RECAPTCHA_ENABLED: true
    secret: true
    services: [shared, auth-backend, ethicapp, management-console]
    phase: runtime
    description: Server-side reCAPTCHA secret key.

  RECAPTCHA_VERIFY_URL:
    type: url
    required: false
    secret: false
    default: "https://www.google.com/recaptcha/api/siteverify"
    services: [shared, auth-backend, management-console]
    phase: runtime
    description: reCAPTCHA verification endpoint.

  VITE_RECAPTCHA_SITE_KEY:
    type: public
    required_when:
      RECAPTCHA_ENABLED: true
    secret: false
    services: [shared, auth-backend, ethicapp, management-console]
    phase: runtime
    description: Public reCAPTCHA site key for frontend and runtime config endpoints.

  VITE_AUTH_PUBLIC_URL:
    type: public-url
    required: true
    secret: false
    services: [auth-backend]
    phase: runtime
    description: Public auth frontend URL emitted into auth runtime-config.js.

  VITE_AUTH_API_BASE_URL:
    type: public-url
    required: true
    secret: false
    services: [auth-backend]
    phase: runtime
    description: Public auth API base URL emitted into auth runtime-config.js.

  ETHICAPP_STUDENT_NODE_PORT:
    type: integer
    required: false
    secret: false
    default: 8503
    services: [ethicapp-student, nginx]
    phase: runtime
    description: Student app backend HTTP port. NGINX uses this value for the internal ethicapp-student upstream.

  ETHICAPP_STUDENT_SESSION_COOKIE_NAME:
    type: string
    required: false
    secret: false
    default: ethicapp.student.sid
    services: [ethicapp-student]
    phase: runtime
    description: Student app session cookie name.

  ETHICAPP_STUDENT_SESSION_SECRET:
    type: secret
    required: false
    secret: true
    services: [ethicapp-student]
    phase: runtime
    description: Student app session signing secret. Falls back to SESSION_SECRET.

  VITE_STUDENT_API_BASE_PATH:
    type: public-string
    required: false
    secret: false
    services: [ethicapp-student]
    phase: runtime
    description: Public base path for student frontend API requests emitted into student runtime-config.js.

  VITE_STUDENT_SOCKET_URL:
    type: public-url
    required: false
    secret: false
    services: [ethicapp-student]
    phase: runtime
    description: Optional public websocket URL emitted into student runtime-config.js.

  VITE_SHOW_DEV_METADATA:
    type: public-boolean
    required: false
    secret: false
    default:
      development: true
      production: false
    services: [ethicapp-student]
    phase: runtime
    description: Shows development-only metadata in student frontend screens through student runtime-config.js.

  MNG_PORT:
    type: integer
    required: false
    secret: false
    default: 8504
    services: [management-console, nginx]
    phase: runtime
    description: Management console backend HTTP port. NGINX uses this value for the internal management-console upstream.

  MNG_SESSION_COOKIE_NAME:
    type: string
    required: false
    secret: false
    default: ethicapp.mng.sid
    services: [management-console]
    phase: runtime
    description: Management console session cookie name.

  MNG_SESSION_COOKIE_MAX_AGE_MS:
    type: integer
    required: false
    secret: false
    default: 7200000
    services: [management-console]
    phase: runtime
    description: Management console local session cookie lifetime in milliseconds. This is separate from the auth-backend browser auth session.

  MNG_SESSION_SECRET:
    type: secret
    required: false
    secret: true
    services: [management-console]
    phase: runtime
    description: Management console session signing secret. Falls back to SESSION_SECRET.

