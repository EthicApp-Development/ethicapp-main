version: 1
name: ethicapp-environment-contract
description: >
  Canonical environment-variable contract for EthicApp. Deployment repositories
  should consume this file from the same git tag as the Docker images being
  deployed, then provide environment-specific values and secrets.

policies:
  locales:
    supported:
      - es_CL
      - en_US
    normalization: "es or es_* resolves to es_CL; every other locale resolves to en_US."
  public_frontend_variables:
    prefix: VITE_
    secret: false
    build_strategy: runtime-config-js
    warning: "VITE_* values are public and are emitted into runtime-config.js when containers start."
  production:
    disallow_placeholder_values:
      - "..."
      - "change-this-in-production"
      - "ChangeMeNow!!"
      - "place_holder_secret_key"
      - "super_secret_password"

services:
  root:
    description: Repository-level Compose and shared runtime settings.
  shared:
    description: Variables shared by multiple backend services.
  ethicapp:
    description: Legacy EthicApp Express and AngularJS application.
  ethicapp-pdf-worker:
    description: Background worker that renders protected uploaded PDFs into derived page images.
  auth-backend:
    description: Authentication service and React authentication frontend.
  ethicapp-student:
    description: Student-facing React and Express application.
  management-console:
    description: Super-admin management application.
  database:
    description: PostgreSQL container initialization settings.

variables:
  NODE_ENV:
    type: enum
    values: [development, production, test]
    required: true
    secret: false
    default:
      development: development
      production: production
    services: [root, ethicapp, auth-backend, ethicapp-student, management-console]
    phase: runtime
    description: Runtime mode used by Node services and cookie security defaults.

  ETHICAPP_WATCH_FRONTEND:
    type: boolean
    required: false
    secret: false
    default:
      development: true
    services: [root, ethicapp]
    phase: runtime
    description: Enables the legacy frontend asset watcher in development.

  TRUST_PROXY:
    type: integer
    required: false
    secret: false
    default: 1
    services: [shared, auth-backend, ethicapp, ethicapp-student, management-console]
    phase: runtime
    description: Express trust proxy setting when services are behind NGINX or another proxy.

  PGHOST:
    type: string
    required: true
    secret: false
    default: postgresql
    services: [shared, auth-backend, ethicapp-pdf-worker, ethicapp-student, management-console]
    phase: runtime
    description: PostgreSQL host.

  PGPORT:
    type: integer
    required: true
    secret: false
    default: 5432
    services: [shared, auth-backend, ethicapp-pdf-worker, ethicapp-student, management-console]
    phase: runtime
    description: PostgreSQL port.

  PGUSER:
    type: string
    required: true
    secret: false
    default: postgres
    services: [shared, auth-backend, ethicapp-pdf-worker, ethicapp-student, management-console]
    phase: runtime
    description: PostgreSQL user.

  PGPASSWORD:
    type: secret
    required: true
    secret: true
    services: [shared, auth-backend, ethicapp-pdf-worker, ethicapp-student, management-console]
    phase: runtime
    description: PostgreSQL password.

  PGDATABASE:
    type: string
    required: true
    secret: false
    default: ethicapp
    services: [shared, auth-backend, ethicapp-pdf-worker, ethicapp-student, management-console]
    phase: runtime
    description: PostgreSQL database name.

  POSTGRES_DB:
    type: string
    required: false
    secret: false
    services: [database, auth-backend, ethicapp-pdf-worker, ethicapp-student, management-console]
    phase: runtime
    description: PostgreSQL image database name and fallback database variable in app configs.

  POSTGRES_USER:
    type: string
    required: false
    secret: false
    services: [database]
    phase: runtime
    description: PostgreSQL image initialization user.

  POSTGRES_PASSWORD:
    type: secret
    required: false
    secret: true
    services: [database]
    phase: runtime
    description: PostgreSQL image initialization password.

  PGSSLMODE:
    type: enum
    values: [disable, require]
    required: false
    secret: false
    default: disable
    services: [shared, auth-backend, ethicapp-pdf-worker, ethicapp-student, management-console]
    phase: runtime
    description: PostgreSQL SSL mode.

  PGPOOL_MAX:
    type: integer
    required: false
    secret: false
    default: 10
    services: [shared, auth-backend, ethicapp-pdf-worker, ethicapp-student, management-console]
    phase: runtime
    description: Maximum PostgreSQL pool size per service.

  PG_IDLE_TIMEOUT:
    type: integer
    required: false
    secret: false
    default: 30000
    services: [shared, auth-backend, ethicapp-pdf-worker, ethicapp-student, management-console]
    phase: runtime
    description: PostgreSQL pool idle timeout in milliseconds.

  PG_CONN_TIMEOUT:
    type: integer
    required: false
    secret: false
    default: 2000
    services: [shared, auth-backend, ethicapp-pdf-worker, ethicapp-student, management-console]
    phase: runtime
    description: PostgreSQL connection timeout in milliseconds.

  DEBUG_SQL:
    type: boolean
    required: false
    secret: false
    default: false
    services: [shared, auth-backend, ethicapp-pdf-worker, ethicapp-student]
    phase: runtime
    description: Enables SQL debug logging.

  DATABASE_URL:
    type: secret
    required: false
    secret: true
    services: [ethicapp, ethicapp-pdf-worker]
    phase: runtime
    description: Optional legacy EthicApp database connection string override.

  DB_CONNECTION_STRING:
    type: secret
    required: false
    secret: true
    services: [ethicapp, ethicapp-pdf-worker]
    phase: runtime
    description: Legacy fallback database connection string for EthicApp scripts and workers.

  REDIS_SESSION_HOST:
    type: string
    required: true
    secret: false
    default: redis-session
    services: [shared, ethicapp, auth-backend]
    phase: runtime
    description: Redis host dedicated to Express session storage. Production deployments must provide a redis-session service or equivalent DNS name.

  REDIS_SESSION_PORT:
    type: integer
    required: false
    secret: false
    default: 6379
    services: [shared, ethicapp, auth-backend]
    phase: runtime
    description: Redis port dedicated to Express session storage.

  REDIS_SESSION_URL:
    type: secret
    required: false
    secret: true
    services: [ethicapp, auth-backend]
    phase: runtime
    description: Optional Redis session URL override, useful when the session Redis requires credentials or TLS.

  REDIS_SESSION_MAXMEMORY:
    type: string
    required: false
    secret: false
    default: 128mb
    services: [shared]
    phase: runtime
    description: Max memory limit for the Redis instance dedicated to Express sessions.

  REDIS_SESSION_MAXMEMORY_POLICY:
    type: enum
    values: [noeviction, allkeys-lru, volatile-lru, allkeys-random, volatile-random, volatile-ttl, volatile-lfu, allkeys-lfu]
    required: false
    secret: false
    default: volatile-ttl
    services: [shared]
    phase: runtime
    description: Eviction policy for the Redis instance dedicated to Express sessions.

  REDIS_CACHE_HOST:
    type: string
    required: true
    secret: false
    default: redis-cache
    services: [shared, ethicapp]
    phase: runtime
    description: Redis host dedicated to database-derived cache entries. Production deployments must provide a redis-cache service or equivalent DNS name.

  REDIS_CACHE_PORT:
    type: integer
    required: false
    secret: false
    default: 6379
    services: [shared, ethicapp]
    phase: runtime
    description: Redis port dedicated to database-derived cache entries.

  REDIS_CACHE_URL:
    type: secret
    required: false
    secret: true
    services: [ethicapp]
    phase: runtime
    description: Optional Redis cache URL override, useful when the cache Redis requires credentials or TLS.

  REDIS_CACHE_MAXMEMORY:
    type: string
    required: false
    secret: false
    default: 256mb
    services: [shared]
    phase: runtime
    description: Max memory limit for the Redis instance dedicated to database-derived cache entries.

  REDIS_CACHE_MAXMEMORY_POLICY:
    type: enum
    values: [noeviction, allkeys-lru, volatile-lru, allkeys-random, volatile-random, volatile-ttl, volatile-lfu, allkeys-lfu]
    required: false
    secret: false
    default: allkeys-lru
    services: [shared]
    phase: runtime
    description: Eviction policy for the Redis instance dedicated to database-derived cache entries.

  SESSION_SECRET:
    type: secret
    required: true
    secret: true
    services: [ethicapp, ethicapp-student, management-console]
    phase: runtime
    description: Shared fallback session signing secret. Prefer service-specific secrets where available.

  ETHICAPP_NODE_PORT:
    type: integer
    required: false
    secret: false
    default: 8501
    services: [ethicapp]
    phase: runtime
    description: Legacy EthicApp HTTP port.

  ETHICAPP_SESSION_COOKIE_NAME:
    type: string
    required: false
    secret: false
    default: ethicapp.sid
    services: [ethicapp]
    phase: runtime
    description: Legacy EthicApp session cookie name.

  ETHICAPP_SESSION_COOKIE_SAMESITE:
    type: enum
    values: [lax, strict, none]
    required: false
    secret: false
    default: lax
    services: [ethicapp]
    phase: runtime
    description: Legacy EthicApp session cookie SameSite policy.

  ETHICAPP_SESSION_COOKIE_SECURE:
    type: boolean
    required: false
    secret: false
    default:
      production: true
      development: false
    services: [ethicapp]
    phase: runtime
    description: Whether the legacy EthicApp session cookie requires HTTPS.

  ETHICAPP_SESSION_COOKIE_MAX_AGE_MS:
    type: integer
    required: false
    secret: false
    default: 86400000
    services: [ethicapp]
    phase: runtime
    description: Legacy EthicApp session cookie max age in milliseconds.

  ETHICAPP_SESSION_TTL_SECONDS:
    type: integer
    required: false
    secret: false
    default: 86400
    services: [ethicapp]
    phase: runtime
    description: Redis TTL for legacy EthicApp sessions.

  ETHICAPP_SESSION_REDIS_PREFIX:
    type: string
    required: false
    secret: false
    default: "ethicapp:sess:"
    services: [ethicapp]
    phase: runtime
    description: Redis key prefix for legacy EthicApp sessions.

  ETHICAPP_PROCESS_ROLE:
    type: enum
    values: [web, pdf-render-worker]
    required: false
    secret: false
    default: web
    services: [ethicapp, ethicapp-pdf-worker]
    phase: runtime
    description: Selects the process started from the EthicApp image entrypoint.

  PDF_RENDER_WORKER_CONCURRENCY:
    type: integer
    required: false
    secret: false
    default: 1
    services: [ethicapp-pdf-worker]
    phase: runtime
    description: Number of PDF render jobs processed concurrently by each worker instance.

  PDF_RENDER_WORKER_POLL_INTERVAL_MS:
    type: integer
    required: false
    secret: false
    default: 2000
    services: [ethicapp-pdf-worker]
    phase: runtime
    description: Delay between worker polling attempts when no PDF render job is available.

  PDF_RENDER_DPI:
    type: integer
    required: false
    secret: false
    default: 150
    services: [ethicapp-pdf-worker]
    phase: runtime
    description: Target DPI for generated PDF page images.

  PDF_RENDER_MAX_PAGES:
    type: integer
    required: false
    secret: false
    default: 50
    services: [ethicapp-pdf-worker]
    phase: runtime
    description: Maximum PDF page count the worker should render before failing a job.

  PDF_RENDER_TIMEOUT_MS:
    type: integer
    required: false
    secret: false
    default: 120000
    services: [ethicapp-pdf-worker]
    phase: runtime
    description: Maximum render command runtime per job in milliseconds.

  ETHICAPP_INTERNAL_BASE_URL:
    type: url
    required: true
    secret: false
    default: "http://ethicapp:8501"
    services: [management-console]
    phase: runtime
    description: Internal URL used by management-console to call legacy EthicApp.

  UPLOADS_PATH:
    type: path
    required: false
    secret: false
    default: uploads
    services: [ethicapp, ethicapp-pdf-worker]
    phase: runtime
    description: Legacy EthicApp upload storage path inside the container, shared with the PDF render worker.

  ALLOWED_ORIGINS:
    type: csv
    required: false
    secret: false
    services: [ethicapp]
    phase: runtime
    status: legacy-commented
    description: Legacy CORS origin list currently not active in app bootstrap.

  CANONICAL_SEED_OWNER_EMAIL:
    type: email
    required: false
    secret: false
    default: profesor@test
    services: [ethicapp]
    phase: job
    description: Owner email used by canonical activity seed scripts.

  PORT:
    type: integer
    required: false
    secret: false
    default: 8502
    services: [auth-backend]
    phase: runtime
    description: Auth backend HTTP port.

  AUTH_PUBLIC_URL:
    type: url
    required: true
    secret: false
    services: [auth-backend]
    phase: runtime
    description: Public auth URL used in generated links and emails.

  AUTH_BACKEND_INTERNAL_BASE_URL:
    type: url
    required: true
    secret: false
    default: "http://auth-backend:8502/api/auth"
    services: [management-console]
    phase: runtime
    description: Internal URL used by management-console to call auth-backend.

  AUTH_INTERNAL_SERVICE_TOKEN:
    type: secret
    required: true
    secret: true
    services: [auth-backend, management-console]
    phase: runtime
    description: Shared secret used by management-console for CSRF-exempt server-to-server calls into auth-backend. Must match in both services.

  AUTH_SESSION_SECRET:
    type: secret
    required: true
    secret: true
    services: [auth-backend]
    phase: runtime
    description: Auth backend session signing secret. Falls back to SESSION_SECRET for legacy deployments, but production deployments should provide this service-specific value.

  AUTH_COOKIE_NAME:
    type: string
    required: false
    secret: false
    default: connect.sid
    services: [auth-backend]
    phase: runtime
    description: Legacy auth-route cookie name used by selected auth controller code.

  SESSION_COOKIE_NAME:
    type: string
    required: false
    secret: false
    default: auth.sid
    services: [auth-backend]
    phase: runtime
    description: Auth backend session cookie name.

  SESSION_COOKIE_SAMESITE:
    type: enum
    values: [lax, strict, none]
    required: false
    secret: false
    default: lax
    services: [auth-backend]
    phase: runtime
    description: Auth backend session cookie SameSite policy.

  SESSION_COOKIE_SECURE:
    type: boolean
    required: false
    secret: false
    default:
      production: true
      development: false
    services: [auth-backend]
    phase: runtime
    description: Whether auth backend cookies require HTTPS.

  AUTH_SESSION_COOKIE_MAX_AGE_MS:
    type: integer
    required: false
    secret: false
    default: 28800000
    services: [auth-backend]
    phase: runtime
    description: Auth backend session cookie max age in milliseconds.

  AUTH_SESSION_TTL_SECONDS:
    type: integer
    required: false
    secret: false
    default: 28800
    services: [auth-backend]
    phase: runtime
    description: Redis TTL for auth backend sessions.

  AUTH_SESSION_REDIS_PREFIX:
    type: string
    required: false
    secret: false
    default: "auth:sess:"
    services: [auth-backend]
    phase: runtime
    description: Redis key prefix for auth backend sessions.

  BCRYPT_SALT_ROUNDS:
    type: integer
    required: false
    secret: false
    default: 10
    services: [auth-backend]
    phase: runtime
    description: Password hashing cost.

  RESET_TOKEN_TTL_MINUTES:
    type: integer
    required: false
    secret: false
    default: 60
    services: [auth-backend]
    phase: runtime
    description: Password reset token lifetime in minutes.

  CREATE_ADMIN:
    type: boolean
    required: false
    secret: false
    default: false
    services: [auth-backend]
    phase: job
    description: Enables bootstrap administrator creation.

  SEED_USERS:
    type: boolean
    required: false
    secret: false
    default: false
    services: [auth-backend]
    phase: job
    description: Enables development or test user seeding.

  WAIT_FOR_DB:
    type: boolean
    required: false
    secret: false
    default: true
    services: [auth-backend]
    phase: runtime
    description: Makes auth-backend wait for PostgreSQL before bootstrapping.

  ADMIN_FIRSTNAME:
    type: string
    required_when:
      CREATE_ADMIN: true
    secret: false
    services: [auth-backend]
    phase: job
    description: Bootstrap administrator first name.

  ADMIN_LASTNAME:
    type: string
    required_when:
      CREATE_ADMIN: true
    secret: false
    services: [auth-backend]
    phase: job
    description: Bootstrap administrator last name.

  ADMIN_DNI:
    type: string
    required_when:
      CREATE_ADMIN: true
    secret: false
    services: [auth-backend]
    phase: job
    description: Bootstrap administrator DNI/RUT.

  ADMIN_EMAIL:
    type: email
    required_when:
      CREATE_ADMIN: true
    secret: false
    services: [auth-backend]
    phase: job
    description: Bootstrap administrator email.

  ADMIN_PASSWORD:
    type: secret
    required_when:
      CREATE_ADMIN: true
    secret: true
    services: [auth-backend]
    phase: job
    description: Bootstrap administrator password.

  ADMIN_SEX:
    type: enum
    values: [M, F, O]
    required_when:
      CREATE_ADMIN: true
    secret: false
    default: M
    services: [auth-backend]
    phase: job
    description: Bootstrap administrator profile sex value.

  SMTP_HOST:
    type: hostname
    required: true
    secret: false
    services: [shared, auth-backend]
    phase: runtime
    description: SMTP host for auth-backend email delivery.

  SMTP_PORT:
    type: integer
    required: false
    secret: false
    default: 465
    services: [shared, auth-backend]
    phase: runtime
    description: SMTP server port. Use 465 with SMTP_SECURE=true, or 587 with STARTTLS.

  SMTP_SECURE:
    type: boolean
    required: false
    secret: false
    default: true
    services: [shared, auth-backend]
    phase: runtime
    description: Enables implicit TLS for SMTP. Should be true when using port 465.

  SMTP_USER:
    type: string
    required: true
    secret: false
    services: [shared, auth-backend]
    phase: runtime
    description: SMTP username.

  SMTP_PASS:
    type: secret
    required: true
    secret: true
    services: [shared, auth-backend]
    phase: runtime
    description: SMTP password.

  SMTP_FROM:
    type: string
    required: true
    secret: false
    services: [shared, auth-backend]
    phase: runtime
    description: Email sender identity.

  RECAPTCHA_ENABLED:
    type: boolean
    required: false
    secret: false
    default: true
    services: [shared, auth-backend, ethicapp, management-console]
    phase: runtime
    description: Enables server-side reCAPTCHA checks.

  RECAPTCHA_SECRET_KEY:
    type: secret
    required_when:
      RECAPTCHA_ENABLED: true
    secret: true
    services: [shared, auth-backend, ethicapp, management-console]
    phase: runtime
    description: Server-side reCAPTCHA secret key.

  RECAPTCHA_VERIFY_URL:
    type: url
    required: false
    secret: false
    default: "https://www.google.com/recaptcha/api/siteverify"
    services: [shared, auth-backend, management-console]
    phase: runtime
    description: reCAPTCHA verification endpoint.

  VITE_RECAPTCHA_SITE_KEY:
    type: public
    required_when:
      RECAPTCHA_ENABLED: true
    secret: false
    services: [shared, auth-backend, ethicapp, management-console]
    phase: runtime
    description: Public reCAPTCHA site key for frontend and runtime config endpoints.

  VITE_AUTH_PUBLIC_URL:
    type: public-url
    required: true
    secret: false
    services: [auth-backend]
    phase: runtime
    description: Public auth frontend URL emitted into auth runtime-config.js.

  VITE_AUTH_API_BASE_URL:
    type: public-url
    required: true
    secret: false
    services: [auth-backend]
    phase: runtime
    description: Public auth API base URL emitted into auth runtime-config.js.

  VITE_INSTITUTION_NAME:
    type: public-string
    required: true
    secret: false
    services: [auth-backend]
    phase: runtime
    description: Institution name emitted into auth runtime-config.js for public legal/auth frontend content.

  VITE_DATAPRIVACY_CONTACT:
    type: public-string
    required: true
    secret: false
    services: [auth-backend]
    phase: runtime
    description: Data privacy contact emitted into auth runtime-config.js for public legal/auth frontend content.

  ETHICAPP_STUDENT_NODE_PORT:
    type: integer
    required: false
    secret: false
    default: 8503
    services: [ethicapp-student]
    phase: runtime
    description: Student app backend HTTP port.

  ETHICAPP_STUDENT_SESSION_COOKIE_NAME:
    type: string
    required: false
    secret: false
    default: ethicapp.student.sid
    services: [ethicapp-student]
    phase: runtime
    description: Student app session cookie name.

  ETHICAPP_STUDENT_SESSION_SECRET:
    type: secret
    required: false
    secret: true
    services: [ethicapp-student]
    phase: runtime
    description: Student app session signing secret. Falls back to SESSION_SECRET.

  VITE_STUDENT_API_BASE_PATH:
    type: public-string
    required: false
    secret: false
    services: [ethicapp-student]
    phase: runtime
    description: Public base path for student frontend API requests emitted into student runtime-config.js.

  VITE_STUDENT_SOCKET_URL:
    type: public-url
    required: false
    secret: false
    services: [ethicapp-student]
    phase: runtime
    description: Optional public websocket URL emitted into student runtime-config.js.

  VITE_SHOW_DEV_METADATA:
    type: public-boolean
    required: false
    secret: false
    default:
      development: true
      production: false
    services: [ethicapp-student]
    phase: runtime
    description: Shows development-only metadata in student frontend screens through student runtime-config.js.

  MNG_PORT:
    type: integer
    required: false
    secret: false
    default: 8504
    services: [management-console]
    phase: runtime
    description: Management console backend HTTP port.

  MNG_SESSION_COOKIE_NAME:
    type: string
    required: false
    secret: false
    default: ethicapp.mng.sid
    services: [management-console]
    phase: runtime
    description: Management console session cookie name.

  MNG_SESSION_SECRET:
    type: secret
    required: false
    secret: true
    services: [management-console]
    phase: runtime
    description: Management console session signing secret. Falls back to SESSION_SECRET.

projections:
  root/.env:
    service: root
    variables:
      - NODE_ENV
      - ETHICAPP_WATCH_FRONTEND
      - REDIS_SESSION_MAXMEMORY
      - REDIS_SESSION_MAXMEMORY_POLICY
      - REDIS_CACHE_MAXMEMORY
      - REDIS_CACHE_MAXMEMORY_POLICY
  root/.env.shared:
    service: shared
    variables:
      - PGHOST
      - PGPORT
      - PGUSER
      - PGPASSWORD
      - PGDATABASE
      - PGSSLMODE
      - PGPOOL_MAX
      - PG_IDLE_TIMEOUT
      - PG_CONN_TIMEOUT
      - TRUST_PROXY
      - REDIS_SESSION_HOST
      - REDIS_SESSION_PORT
      - REDIS_SESSION_URL
      - REDIS_CACHE_HOST
      - REDIS_CACHE_PORT
      - REDIS_CACHE_URL
      - DEBUG_SQL
      - SMTP_HOST
      - SMTP_PORT
      - SMTP_SECURE
      - SMTP_USER
      - SMTP_PASS
      - SMTP_FROM
      - RECAPTCHA_ENABLED
      - RECAPTCHA_SECRET_KEY
      - RECAPTCHA_VERIFY_URL
      - VITE_RECAPTCHA_SITE_KEY
  ethicapp/.env:
    service: ethicapp
    variables:
      - ETHICAPP_NODE_PORT
      - NODE_ENV
      - SESSION_SECRET
      - ETHICAPP_SESSION_COOKIE_NAME
      - ETHICAPP_SESSION_COOKIE_SAMESITE
      - ETHICAPP_SESSION_COOKIE_SECURE
      - ETHICAPP_SESSION_COOKIE_MAX_AGE_MS
      - ETHICAPP_SESSION_TTL_SECONDS
      - ETHICAPP_SESSION_REDIS_PREFIX
      - UPLOADS_PATH
      - CANONICAL_SEED_OWNER_EMAIL
  auth-backend/.env:
    service: auth-backend
    variables:
      - PORT
      - NODE_ENV
      - AUTH_SESSION_SECRET
      - SESSION_COOKIE_NAME
      - SESSION_COOKIE_SAMESITE
      - SESSION_COOKIE_SECURE
      - AUTH_COOKIE_NAME
      - AUTH_SESSION_COOKIE_MAX_AGE_MS
      - AUTH_SESSION_TTL_SECONDS
      - AUTH_SESSION_REDIS_PREFIX
      - AUTH_INTERNAL_SERVICE_TOKEN
      - BCRYPT_SALT_ROUNDS
      - RESET_TOKEN_TTL_MINUTES
      - CREATE_ADMIN
      - SEED_USERS
      - WAIT_FOR_DB
      - ADMIN_FIRSTNAME
      - ADMIN_LASTNAME
      - ADMIN_DNI
      - ADMIN_EMAIL
      - ADMIN_PASSWORD
      - ADMIN_SEX
      - AUTH_PUBLIC_URL
      - VITE_AUTH_PUBLIC_URL
      - VITE_AUTH_API_BASE_URL
      - VITE_RECAPTCHA_SITE_KEY
      - VITE_INSTITUTION_NAME
      - VITE_DATAPRIVACY_CONTACT
  ethicapp-student/.env:
    service: ethicapp-student
