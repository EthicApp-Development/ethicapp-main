name: EthicApp APIv2 Test and Deploy

on:
  push:
    branches:
      - apiv2
      - 'issue-*'
  pull_request:
    branches:
      - apiv2

jobs:
  test_and_deploy:
    runs-on: [self-hosted, apiV2]
    name: Test and Deploy EthicApp APIv2
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Define COMPOSE_PROJECT_NAME
        run: echo "COMPOSE_PROJECT_NAME=ethicapp-apiv2" >> $GITHUB_ENV

      - name: Sync code to runner
        run: |
          mkdir -p ~/ethicapp-apiv2
          rsync -a --delete . ~/ethicapp-apiv2/

      - name: Cleanup existing containers and volumes
        run: |
          cd ~/ethicapp-apiv2
          docker-compose down --remove-orphans --volumes
          rm -rf ./db-data-volume

      - name: Initialize database
        run: |
          cd ~/ethicapp-apiv2
          npm run init-db

      - name: Create JWT secret directory and token file
        run: |
          cd ~/ethicapp-apiv2
          mkdir -p ./secrets
          echo "${{ secrets.JWT_SECRET_TOKEN }}" > ./secrets/jwt_token
          chmod 600 ./secrets/jwt_token

      - name: Build and start containers
        run: |
          cd ~/ethicapp-apiv2
          docker-compose up -d --build

      - name: Wait for services to be ready
        run: |
          cd ~/ethicapp-apiv2
          echo "Waiting for services to be ready..."
          sleep 20
          docker ps

      - name: Prepare test environment
        run: |
          cd ~/ethicapp-apiv2
          docker exec ethicapp-apiv2-node npm run test:clean

      - name: Run tests
        id: run_tests
        run: |
          cd ~/ethicapp-apiv2
          if docker exec ethicapp-apiv2-node npm run test; then
            echo "::set-output name=tests_passed::true"
            echo "Tests passed successfully!"
          else
            echo "::set-output name=tests_passed::false"
            echo "Tests failed!"
            exit 1
          fi

      - name: Deploy on successful tests
        if: steps.run_tests.outputs.tests_passed == 'true'
        run: |
          cd ~/ethicapp-apiv2
          echo "Deploying the application..."
          # Add any additional deployment steps here if needed
          docker-compose restart node

      - name: Verify active containers
        if: steps.run_tests.outputs.tests_passed == 'true'
        run: docker ps

      - name: Cleanup on failure
        if: failure()
        run: |
          cd ~/ethicapp-apiv2
          docker-compose down --remove-orphans
          echo "Cleaning up after failure"