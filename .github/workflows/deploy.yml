name: EthicApp APIv2 Test and Deploy

on:
  push:
    branches:
      - apiv2
      - 'issue-*'
  pull_request:
    branches:
      - apiv2

jobs:
  test_and_deploy:
    runs-on: [self-hosted, apiV2]
    name: Test and Deploy EthicApp APIv2
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Define COMPOSE_PROJECT_NAME
        run: echo "COMPOSE_PROJECT_NAME=ethicapp-apiv2" >> $GITHUB_ENV

      - name: Sync code to runner
        run: |
          mkdir -p ~/ethicapp-apiv2
          # Use --chmod to set appropriate permissions during sync
          rsync -a --delete --exclude="db-data-volume/" --chmod=Du+rwx,Fu+rw . ~/ethicapp-apiv2/

      - name: Cleanup existing containers and volumes
        run: |
          cd ~/ethicapp-apiv2
          docker-compose down --remove-orphans --volumes
          # Use sudo to remove the db-data-volume directory
          sudo rm -rf ./db-data-volume

      - name: Initialize database
        run: |
          cd ~/ethicapp-apiv2
          npm run init-db

      - name: Create JWT secret directory and token file
        run: |
          cd ~/ethicapp-apiv2
          mkdir -p ./secrets
          echo "${{ secrets.JWT_SECRET_TOKEN }}" > ./secrets/jwt_token
          chmod 600 ./secrets/jwt_token

      - name: Build and start containers
        run: |
          cd ~/ethicapp-apiv2
          docker-compose up -d --build

      - name: Wait for services to be ready
        run: |
          cd ~/ethicapp-apiv2
          echo "Waiting for services to be ready..."
          sleep 20
          docker ps

      - name: Debug container status
        run: |
          cd ~/ethicapp-apiv2
          echo "Checking container status..."
          docker ps -a
          echo "Checking container logs..."
          docker logs ethicapp-apiV2-node
          echo "Checking file structure..."
          docker exec ethicapp-apiV2-node ls -la /home/app
          echo "Checking Node.js version..."
          docker exec ethicapp-apiV2-node node --version
          echo "Checking NPM version..."
          docker exec ethicapp-apiV2-node npm --version

      - name: Simplify test approach
        run: |
          cd ~/ethicapp-apiv2
          # Intentar ejecutar un comando simple para verificar que el contenedor está funcionando correctamente
          docker exec ethicapp-apiV2-node echo "Container is working"
          # Verificar que la base de datos está accesible
          docker exec ethicapp-apiV2-postgres pg_isready -U ${DB_USER_NAME}

      - name: Install basic packages and run simplified test
        run: |
          cd ~/ethicapp-apiv2
          # Instalar solo los paquetes esenciales
          docker exec ethicapp-apiV2-node npm install --no-fund --quiet
          # Ejecutar un test simplificado o un comando que no dependa de sequelize
          echo "Attempting to run a simple test..."
          docker exec -e NODE_ENV=test ethicapp-apiV2-node node -e "console.log('Node.js is working')"

      - name: Run tests
        id: run_tests
        run: |
          cd ~/ethicapp-apiv2
          if docker exec -e NODE_ENV=test ethicapp-apiV2-node npm run test; then
            echo "tests_passed=true" >> $GITHUB_OUTPUT
            echo "Tests passed successfully!"
          else
            echo "tests_passed=false" >> $GITHUB_OUTPUT
            echo "Tests failed!"
            exit 1
          fi

      - name: Deploy on successful tests
        if: steps.run_tests.outputs.tests_passed == 'true'
        run: |
          cd ~/ethicapp-apiv2
          echo "Deploying the application..."
          # Add any additional deployment steps here if needed
          docker-compose restart node

      - name: Verify active containers
        if: steps.run_tests.outputs.tests_passed == 'true'
        run: docker ps

      - name: Cleanup on failure
        if: failure()
        run: |
          cd ~/ethicapp-apiv2
          docker-compose down --remove-orphans
          echo "Cleaning up after failure"