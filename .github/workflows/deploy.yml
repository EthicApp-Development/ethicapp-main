name: Deploy EthicApp APIv2

on:
  push:
    branches:
      - apiv2
      - 'issue-*'
  pull_request:
    branches:
      - apiv2

jobs:
  integration_test_in_docker:
    runs-on: [self-hosted, apiV2]
    name: Run tests inside docker-compose
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Definir COMPOSE_PROJECT_NAME
        run: echo "COMPOSE_PROJECT_NAME=ethicapp-apiv2" >> $GITHUB_ENV

      - name: Copiar el código al runner
        run: |
          mkdir -p /opt/ethicapp-apiv2
          rsync -a --delete . /opt/ethicapp-apiv2/

      - name: Detener contenedores anteriores
        run: |
          cd /opt/ethicapp-apiv2
          docker-compose down --remove-orphans

      - name: Levantar entorno para test
        run: |
          cd /opt/ethicapp-apiv2
          docker-compose up -d --build

      - name: Esperar que el entorno esté listo
        run: sleep 15

      - name: Truncar base de datos
        run: docker exec ethicapp-apiv2-node npm run test:truncate

      - name: Limpiar registros
        run: docker exec ethicapp-apiv2-node npm run test:clean

      - name: Ejecutar tests
        run: docker exec ethicapp-apiv2-node npm run test

      - name: Apagar entorno temporal de test
        if: always()
        run: |
          cd /opt/ethicapp-apiv2
          docker-compose down --remove-orphans

  deploy:
    needs: integration_test_in_docker
    runs-on: [self-hosted, apiV2]
    name: Deploy containers to server
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Definir COMPOSE_PROJECT_NAME
        run: echo "COMPOSE_PROJECT_NAME=ethicapp-apiv2" >> $GITHUB_ENV

      - name: Sincronizar código
        run: |
          mkdir -p /opt/ethicapp-apiv2
          rsync -a --delete . /opt/ethicapp-apiv2/

      - name: Inicializar base de datos
        run: |
          cd /opt/ethicapp-apiv2
          npm run init-db

      - name: Desplegar contenedores
        run: |
          cd /opt/ethicapp-apiv2
          docker-compose down --remove-orphans
          docker-compose up -d --build

      - name: Verificar contenedores activos
        run: docker ps
