name: EthicApp APIv2 Test and Deploy

on:
  push:
    branches:
      - apiv2
      - 'issue-*'
  pull_request:
    branches:
      - apiv2

jobs:
  test_and_deploy:
    runs-on: [self-hosted, apiV2]
    name: Test and Deploy EthicApp APIv2
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Define environment variables
        run: |
          echo "COMPOSE_PROJECT_NAME=ethicapp-apiv2" >> $GITHUB_ENV
          # Explicitly set DB_USER_NAME from .env file for use in pipeline
          if [ -f ./.env ]; then
            export $(grep -v '^#' ./.env | xargs)
            echo "DB_USER_NAME=$DB_USER_NAME" >> $GITHUB_ENV
            echo "DB_TEST_USER_NAME=$DB_TEST_USER_NAME" >> $GITHUB_ENV
            echo "DB_TEST_NAME=$DB_TEST_NAME" >> $GITHUB_ENV
          else
            echo "No .env file found, using defaults"
            echo "DB_USER_NAME=ethicapp" >> $GITHUB_ENV
            echo "DB_TEST_USER_NAME=ethicapp_test" >> $GITHUB_ENV
            echo "DB_TEST_NAME=ethicapp_test" >> $GITHUB_ENV
          fi

      - name: Sync code to runner
        run: |
          mkdir -p ~/ethicapp-apiv2
          # Use --chmod to set appropriate permissions during sync
          rsync -a --delete --exclude="db-data-volume/" --chmod=Du+rwx,Fu+rw . ~/ethicapp-apiv2/

      - name: Create JWT secret
        run: |
          cd ~/ethicapp-apiv2
          mkdir -p ./secrets
          echo "${{ secrets.JWT_SECRET_TOKEN }}" > ./secrets/jwt_token
          chmod 600 ./secrets/jwt_token

      - name: Cleanup existing containers and volumes
        run: |
          cd ~/ethicapp-apiv2
          docker-compose down --remove-orphans --volumes
          sudo rm -rf ./db-data-volume || true

      - name: Initialize database
        run: |
          cd ~/ethicapp-apiv2
          npm run init-db

      - name: Build and start containers
        run: |
          cd ~/ethicapp-apiv2
          docker-compose up -d --build

      - name: Wait for services to be ready
        run: |
          cd ~/ethicapp-apiv2
          echo "Waiting for services to be ready..."
          sleep 30
          docker ps | grep ethicapp-apiV2

      - name: Install Babel and Jest dependencies
        run: |
          cd ~/ethicapp-apiv2
          echo "Installing Babel and Jest dependencies..."
          # Instalar dependencias globales
          docker exec ethicapp-apiV2-node npm install -g jest sequelize-cli
          
          # Instalar dependencias de Babel necesarias para los tests
          docker exec ethicapp-apiV2-node npm install --save-dev @babel/core @babel/preset-env babel-jest
          
          # Verificar que las dependencias críticas están instaladas
          docker exec ethicapp-apiV2-node npm list @babel/preset-env || true
          
          # Crear o actualizar .babelrc
          docker exec ethicapp-apiV2-node bash -c "echo '{\"presets\": [\"@babel/preset-env\"]}' > .babelrc"
          
          # Crear Jest config
          docker exec ethicapp-apiV2-node bash -c "echo '{\"transform\": {\"^.+\\\\.jsx?$\": \"babel-jest\"}, \"transformIgnorePatterns\": [\"node_modules/(?!@babel)\"], \"testEnvironment\": \"node\"}' > jest.config.json"
          
          # Asegurarse que sequelize y otras dependencias estén instaladas en el backend
          docker exec ethicapp-apiV2-node bash -c "cd ./backend/api/v2 && npm install sequelize sequelize-cli pg pg-hstore"

      - name: Verify database connection
        run: |
          cd ~/ethicapp-apiv2
          # Verify postgres connection with explicit username
          docker exec ethicapp-apiV2-postgres pg_isready -U $DB_USER_NAME || true
          # Check if test database exists
          docker exec ethicapp-apiV2-postgres psql -U $DB_USER_NAME -c "SELECT 1 FROM pg_database WHERE datname='$DB_TEST_NAME'" || true

      - name: Prepare test environment
        run: |
          cd ~/ethicapp-apiv2
          echo "Preparando el entorno de prueba..."
          # Ejecutar con NODE_ENV=test para asegurar que se está usando la base de datos de prueba
          docker exec -e NODE_ENV=test ethicapp-apiV2-node npm run test:clean || true
          
          # Si el comando anterior falla, intentar ejecutar los comandos directamente
          echo "Intentando migraciones directamente si el comando anterior falló..."
          docker exec -e NODE_ENV=test ethicapp-apiV2-node bash -c "cd ./backend/api/v2 && npx sequelize-cli db:migrate:undo:all" || true
          docker exec -e NODE_ENV=test ethicapp-apiV2-node bash -c "cd ./backend/api/v2 && npx sequelize-cli db:migrate" || true
          docker exec -e NODE_ENV=test ethicapp-apiV2-node bash -c "cd ./backend/api/v2 && npx sequelize-cli db:seed:all" || true

      - name: Run tests
        id: run_tests
        run: |
          cd ~/ethicapp-apiv2
          echo "Ejecutando los tests..."
          
          # Intento 1: Usando npm run test (el enfoque estándar)
          if docker exec -e NODE_ENV=test -e NODE_PATH=/usr/local/lib/node_modules ethicapp-apiV2-node npm run test; then
            echo "tests_passed=true" >> $GITHUB_OUTPUT
            echo "Tests passed successfully!"
          else
            echo "Standard test failed, attempting alternative test approach..."
            
            # Intento 2: Ejecutar los tests directamente desde el directorio de test
            if docker exec -e NODE_ENV=test -e NODE_PATH=/usr/local/lib/node_modules ethicapp-apiV2-node bash -c "cd ./backend/api/v2/test && npx jest"; then
              echo "tests_passed=true" >> $GITHUB_OUTPUT
              echo "Tests passed successfully with alternative approach!"
            else
              echo "Second approach failed, trying with explicit babel-node..."
              
              # Intento 3: Usar babel-node para ejecutar los tests
              docker exec ethicapp-apiV2-node npm install -g @babel/node
              if docker exec -e NODE_ENV=test ethicapp-apiV2-node bash -c "cd ./backend/api/v2/test && npx babel-node ./repeat-test.sh"; then
                echo "tests_passed=true" >> $GITHUB_OUTPUT
                echo "Tests passed successfully with babel-node approach!"
              else
                # Si todos los intentos fallan, salir con error
                echo "tests_passed=false" >> $GITHUB_OUTPUT
                echo "All test attempts failed!"
                
                # Mostrar información de diagnóstico
                echo "Diagnostic information:"
                docker exec ethicapp-apiV2-node bash -c "cd ./backend/api/v2 && ls -la"
                docker exec ethicapp-apiV2-node bash -c "cat .babelrc"
                docker exec ethicapp-apiV2-node bash -c "cat jest.config.json"
                
                exit 1
              fi
            fi
          fi

      - name: Deploy on successful tests
        if: success()
        run: |
          cd ~/ethicapp-apiv2
          echo "Deploying the application..."
          docker-compose restart ethicapp-apiV2-node || docker-compose restart node

      - name: Verify active containers
        if: success()
        run: docker ps | grep ethicapp-apiV2

      - name: Cleanup on failure
        if: failure()
        run: |
          cd ~/ethicapp-apiv2
          echo "Cleaning up after failure"
          docker-compose logs ethicapp-apiV2-node
          docker-compose logs ethicapp-apiV2-postgres
          # Opcional: detener contenedores en caso de fallo
          # docker-compose down --remove-orphans || true