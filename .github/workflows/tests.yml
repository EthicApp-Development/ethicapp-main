name: EthicApp Test

on:
  push:
    branches:
      - apiv2
      - 'issue-*'
  pull_request:
    branches:
      - apiv2
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, apiV2]
    name: Run EthicApp Tests
    outputs:
      tests_passed: ${{ steps.run_tests.outputs.tests_passed }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Define environment variables
        run: |
          echo "COMPOSE_PROJECT_NAME=ethicapp-test" >> $GITHUB_ENV
          if [ -f ./.env ]; then
            export $(grep -v '^#' ./.env | xargs)
            echo "DB_USER_NAME=$DB_USER_NAME" >> $GITHUB_ENV
            echo "DB_TEST_USER_NAME=$DB_TEST_USER_NAME" >> $GITHUB_ENV
            echo "DB_TEST_NAME=$DB_TEST_NAME" >> $GITHUB_ENV
          else
            echo "No .env file found, using defaults"
            echo "DB_USER_NAME=postgres" >> $GITHUB_ENV
            echo "DB_TEST_USER_NAME=postgres" >> $GITHUB_ENV
            echo "DB_TEST_NAME=ethicapp_test" >> $GITHUB_ENV
          fi

      - name: Create JWT secret for tests
        run: |
          mkdir -p ./secrets
          echo "${{ secrets.JWT_SECRET_TOKEN }}" > ./secrets/jwt_token
          chmod 600 ./secrets/jwt_token

      - name: Cleanup existing test containers
        run: |
          docker-compose -f docker-compose.test.yml down --remove-orphans --volumes || true
          docker rm -f ethicapp-test-node ethicapp-test-postgres || true
          docker volume rm -f postgres_test_data || true

      - name: Build test containers
        run: |
          docker-compose -f docker-compose.test.yml build

      - name: Start test containers
        run: |
          docker-compose -f docker-compose.test.yml up -d
          echo "Waiting for services to be ready..."
          sleep 15
          docker ps | grep ethicapp-test

      - name: Verify database connection
        run: |
          # Verify postgres connection
          docker exec ethicapp-test-postgres pg_isready -U postgres || true
          # Check if test database exists
          docker exec ethicapp-test-postgres psql -U postgres -c "SELECT 1 FROM pg_database WHERE datname='ethicapp_test'" || true

      - name: Prepare test database
        run: |
          # Prepare test database using npx to ensure sequelize-cli is available
          echo "Preparing test database..."
          docker exec -e NODE_ENV=test ethicapp-test-node bash -c "cd /home/app/backend/api/v2 && npx sequelize-cli db:migrate:undo:all" || true
          docker exec -e NODE_ENV=test ethicapp-test-node bash -c "cd /home/app/backend/api/v2 && npx sequelize-cli db:migrate" || true
          docker exec -e NODE_ENV=test ethicapp-test-node bash -c "cd /home/app/backend/api/v2 && npx sequelize-cli db:seed:all" || true

      - name: Run tests
        id: run_tests
        run: |
          # Make sure the test script is executable
          docker exec ethicapp-test-node bash -c "chmod +x /home/app/backend/api/v2/test/repeat-test.sh"
          
          # Run the tests
          echo "Running tests..."
          if docker exec -e NODE_ENV=test ethicapp-test-node bash -c "cd /home/app && ./backend/api/v2/test/repeat-test.sh"; then
            echo "tests_passed=true" >> $GITHUB_OUTPUT
            echo "Tests passed successfully!"
          else
            echo "Tests failed"
            echo "tests_passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Cleanup test containers
        if: always()
        run: |
          docker-compose -f docker-compose.test.yml down --volumes