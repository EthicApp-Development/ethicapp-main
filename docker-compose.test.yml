version: "3.9"
services:
  # Base de datos PostgreSQL para pruebas
  test-postgres:
    container_name: "ethicapp-test-postgres"
    image: postgres:14
    environment:
      POSTGRES_DB: ethicapp_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5440:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  # Servicio Node.js para pruebas
  test-node:
    container_name: "ethicapp-test-node"
    build:
      context: ./ethicapp
      dockerfile: ../Dockerfile.test
    environment:
      NODE_ENV: test
      NODE_PORT: 3200
      ALLOWED_ORIGINS: "*"
      # Variables para base de datos
      DB_HOST: ethicapp-test-postgres
      DB_PORT: 5432
      DB_NAME: ethicapp_test
      DB_USER_NAME: postgres
      DB_USER_PASSWORD: postgres
      # Variables adicionales para diferentes configuraciones
      DATABASE_URL: postgres://postgres:postgres@ethicapp-test-postgres:5432/ethicapp_test
      POSTGRES_HOST: ethicapp-test-postgres
      POSTGRES_DB: ethicapp_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "3200:3200"
    volumes:
      - "./ethicapp:/home/app:rw"
      - "./backend/config:/home/app/backend/config:rw"  # Añadido para montar el directorio de config
      - "./secrets:/home/app/secrets:rw"  # Añadido para montar los secretos JWT
    # Esperamos a que la base de datos esté lista usando la condición de healthcheck
    depends_on:
      test-postgres:
        condition: service_healthy
volumes:
  postgres_test_data: