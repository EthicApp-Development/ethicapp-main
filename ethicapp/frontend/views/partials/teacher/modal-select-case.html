
<div class="modal-content" ng-init="getUsefullCases()" style="width: 800px;">
    <div class="modal-header">
        <button type="button" class="close" aria-label="Close" ng-click="dismiss()">
            <span aria-hidden="true">&times;</span>
        </button>
        <h2 class="modal-title" id="exampleModalLongTitle">Elegir caso</h2>
        <p>También puedes adjuntar documentos directamente.</p>
    </div>

    <div class="modal-body">
       
        <div class="tab_cs">
            <button class="tab_cs" ng-click="tabSelectCase='selectCase'" ng-class="{'btn_selected': tabSelectCase == 'selectCase'}">
                {{'cases'|translate}}
            </button>
            <button class="tab_cs" ng-click="tabSelectCase='createCase'" ng-class="{'btn_selected': tabSelectCase == 'createCase'}">
                {{'documents'|translate}}
            </button>
            <div style="float: left;display: flex;justify-content: left;align-items: center;">
                <input class="form-control text-left search-input fontAwesome" type="text"
                    placeholder="{{'search'|translate}}  &#xF002;" ng-model="userSearch">
            </div>
        </div>
    
        <div class="wrapper">
            <div class="container" style="overflow: scroll; max-height: 40em; min-height: 10em; border: #bbb 1px solid;">
                <div class="activities_container" style="margin-top: 2em;">
                    <div class="list-group pad-content">
    
                        <div class="box-item" ng-repeat="case in usefullCases | filter:customFilter" ng-if="tabSelectCase == 'selectCase'">
        
    
                            <div style="display: inline-flex; justify-content: space-between">
                                <div>
                                    <h4 class="list-group-item-heading" ng-bind="case.title || ('untitled' | translate)"></h4>
                                    <h5 class="list-group-item-heading" ng-bind="case.description || ('noDescription' | translate)"></h5>
                                    <h6 class="list-group-item-heading" ng-bind="case.creator"></h6>
                    
                                    <p class="list-group-item-text"></p>
                                    <p class="list-group-item-text">{{'lastModificationDate' | translate}}: {{formatDate(case.updated_at)  }}</p>
                                </div>
                                <div class="text-right vertical-align">
                                    <button class="btn btn-primary btn-smaller ml-1" ng-click="selectCase(case.case_id)">
                                        {{'usar' | translate}}
                                    </button>
                                </div>
                            </div>
                            <div ng-if="case.topic_tags.length > 0">
                                <hr class="mt-1medio">
                                <div>
                                    <p class="list-group-item-text">{{'tags' | translate}}:</p>
        
                                    <div class="tags-container" >
                                        <div class="tag-container" ng-repeat="tag in case.topic_tags track by $index">
                                            <span class="tag-text">
                                                <p>{{tag.name}}</p>
                                            </span>
                                        </div>
                                    </div> 
                                </div>
                            </div>
                        </div>
                    </div>
    
                    <div ng-if="tabSelectCase == 'createCase'">     
                        <input type="file" id="file-input" multiple style="display: none;" accept="application/pdf"/>
                        <div class="upload-container" id="upload-container" ng-click="triggerFileInput()" ng-init="initDragDrop()">
                            <p>{{'dragDropMsg' | translate}}</p>
                        </div>         
                        <div class="file-item list-group-item" ng-repeat="document in formFiles track by $index">                                <div class="line-form-nd">
                                <div class="line-row-nd">
                                    <input type="text" class="form-control line_input" name="fileName" ng-model="document.name" ng-keypress="renameDocumentOnEnter($event, document.id)" ng-id="input-name-{{$index}}">
                                </div>
                            </div>
                            <div>
                                <button class="btn btn-primary ml-1" ng-click="viewFile($event, document.path)" ng-id="btn-view-file-{{$index}}">{{'view' | translate}}</button>
                                <button class="btn btn-danger btn-smaller ml-1" ng-click="removeFile($event, $index)" ng-id="btn-remove-file-{{$index}}">{{'delete' | translate}}</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    
    </div>




    <div class="modal-footer">
        <button type="button" class="btn btn-primary" ng-if="tabSelectCase == 'createCase' && formFiles.length > 0" ng-click="createCaseFromDocs($event)" ng-disabled="formFiles.length == 20">{{'createCase' | translate}}</button>
    </div>
</div>
