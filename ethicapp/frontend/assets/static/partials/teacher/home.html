<h2>{{'home' | translate}}</h2>
<p class="margin-top-24" style="width: 60em;">{{'homeMsg' | translate}}</p>

<!--Choices-->
<div class="flex_container" ng-init="path='assets/images/iconsets/gray-lineart/'">
    <div ng-click="navigateTo('/designs/new')" 
        ng-init="design = true"
        ng-mouseover="design = false"
        ng-mouseout="design = true">
        <p class="box_text">{{'designActivity' | translate}}</p>
        <div class="thumbnail_image" ng-show="design" style="background-image: url('{{path}}design-activity.svg');"></div>
        <div class="thumbnail_image" ng-show="!design" style="background-image: url('{{path}}design-activity-active.svg');"></div>
    </div>
    <div ng-click="navigateTo('/activities/new')"
        ng-init="launch = true"
        ng-mouseover="launch = false"
        ng-mouseout="launch = true">
        <p class="box_text">{{'launchAnActivity' | translate}}</p>
        <div class="thumbnail_image" ng-show="launch" style="background-image: url('{{path}}launch.svg');"></div>
        <div class="thumbnail_image" ng-show="!launch" style="background-image: url('{{path}}launch-active.svg');"></div>
    </div>
    <div ng-click="navigateTo('/designs')"
        ng-init="designSearch = true"
        ng-mouseover="designSearch = false"
        ng-mouseout="designSearch = true">
        <p class="box_text">{{'searchDesigns' | translate}}</p>
        <div class="thumbnail_image" ng-show="designSearch" style="background-image: url('{{path}}design-search.svg');"></div>
        <div class="thumbnail_image" ng-show="!designSearch" style="background-image: url('{{path}}design-search-active.svg');"></div>
    </div>
</div>

<h2>{{'recentActivity'|translate}}</h2>
<div class="activities_home_container" ng-controller= "ActivityController">
    <div class="list-group pad-content">
        <div class="list-group-item w-home" ng-repeat="ses in currentActivities(0) | limitTo: 3 | orderBy : '-time'">
            <div>
                <h4 class="list-group-item-heading" ng-bind="ses.name"></h4>
                <p class="list-group-item-text" ng-bind="ses.descr"></p>
                <p class="list-group-item-text">{{'launched' | translate}} {{ses.time | date}}</p>
                <p class="list-group-item-text">{{'code' | translate}}: {{ses.code}}</p>
            </div>
            
            <div class="text-right vertical-align">
                <button class="btn btn-primary " ng-click="navigateTo('/activities/'+ses.id)">{{'gotoActivity' | translate}}</button>
            </div>
        </div>
    </div>
</div>
