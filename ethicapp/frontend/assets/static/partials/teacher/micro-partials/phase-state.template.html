<div>
    <h5>{{ "phase_title_text" | translate }} {{ ctrl.phaseData.descriptor.number }}</h5>
    <div ng-if="ctrl.phaseData.descriptor.mode !== 'team'">
        <individual-phase-table phase-data="ctrl.phaseData" design-type="ctrl.designType">
        </individual-phase-table>
    </div>
    <div ng-if="ctrl.phaseData.descriptor.mode === 'team'">
        <group-phase-table phase-data="ctrl.phaseData" design-type="ctrl.designType">
        </group-phase-table>
    </div>
</div>
