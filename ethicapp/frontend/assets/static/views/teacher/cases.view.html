<div ng-controller="CasesController as vm" ng-init="vm.loadCase()">
    <div class="row">
        <div class="col-md-12">
            <h2><i class="fa fa-book"></i> {{ 'ethical_cases_view_title' | translate }}</h2>
            <button type="button" class="btn btn-default btn-sm mb-2" ng-click="vm.goBack()">
                <i class="fa fa-arrow-left" aria-hidden="true"></i> {{ 'go_back' | translate }}
            </button>
            <br>
        </div>
    </div>

    <case-card case-item="vm.caseObj" show-actions="false" ng-if="vm.caseObj"></case-card>

    <div class="panel panel-default" ng-if="vm.caseObj && vm.getCaseContentUrl(vm.caseObj)">
        <div class="panel-body">
            <embed
                ng-src="{{ vm.getCaseContentUrl(vm.caseObj) }}"
                type="application/pdf"
                width="100%"
                height="720px" />
        </div>
    </div>
</div>
