<div class="row">
    <div class="col-md-12 mb-2">
        <h2><i class="fa fa-home" aria-hidden="true"></i> {{'teacher_workbench' | translate}}</h2>
        <p class="margin-top-24" style="width: 60em;">{{'homeMsg' | translate}}</p>
    </div>
</div>

<div class="container home-card-container">
    <div class="row">
        <div class="col-md-12">
            <div class="panel panel-default teacher-workbench-panel">
                <div class="panel-body">
                    <div class="home-card-grid" aria-label="{{'teacher_workbench' | translate}}">
                        <button
                            type="button"
                            ng-click="navigateTo('/cases/new')"
                            class="home-card">
                            <img src="/assets/images/cards/create-case.jpg" class="img-responsive" alt="Create a case">
                            <span class="home-card-caption">
                                {{'createACase' | translate}}
                            </span>
                        </button>

                        <button
                            type="button"
                            ng-click="navigateTo('/designs/new')"
                            class="home-card">
                            <img src="/assets/images/cards/design-activity.jpg" class="img-responsive" alt="Design an activity">
                            <span class="home-card-caption">
                                {{'designActivity' | translate}}
                            </span>
                        </button>

                        <button
                            type="button"
                            ng-click="navigateTo('/activities/new')"
                            class="home-card">
                            <img src="/assets/images/cards/launch-activity.jpg" class="img-responsive" alt="Launch an activity">
                            <span class="home-card-caption">
                                {{'launchAnActivity' | translate}}
                            </span>
                        </button>

                        <button
                            type="button"
                            ng-click="navigateTo('/designs')"
                            class="home-card">
                            <img src="/assets/images/cards/search-designs.jpg" class="img-responsive" alt="Search designs">
                            <span class="home-card-caption">
                                {{'searchDesigns' | translate}}
                            </span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-md-12" ng-controller= "ActivityController as ac">
            <div class="panel panel-default">
                <div class="panel-heading">
                    {{ 'recent_activities_title_text'| translate }}
                </div>
                <div class="panel-body" ng-show="ac.activities.ongoing.length === 0 && ac.activities.finished.length === 0">
                    <p>{{ 'no_recent_activities_text' | translate }}</p>
                    <button class="btn btn-default btn-sm" ng-click="navigateTo('/cases/new')">
                        <i class="fa fa-book" aria-hidden="true"></i> {{'ethical_cases_create' | translate}}
                    </button>
                    &nbsp;
                    &nbsp;
                    &nbsp;
                    <button class="btn btn-default btn-sm" ng-click="navigateTo('/designs/new')">
                        <i class="fa fa-paint-brush" aria-hidden="true"></i> {{'create_design' | translate}}
                    </button>
                    &nbsp;
                    &nbsp;
                    &nbsp;
                    <button class="btn btn-default btn-sm" ng-click="navigateTo('/activities/new')">
                        <i class="fa-brands fa-space-awesome" aria-hidden="true"></i> {{'launch_activity' | translate}}
                    </button>
                </div>
                <div class="panel-body" ng-show="ac.activities.ongoing.length > 0 || ac.activities.finished.length > 0">                     
                    <activity-description on-view="ac.handleView" ng-repeat="act in ac.activities.ongoing | limitTo: 3 | orderBy : '-time'" activity="act"></activity-description>
                    <activity-description on-view="ac.handleView" ng-repeat="act in ac.activities.finished | limitTo: 3 | orderBy : '-time'" activity="act"></activity-description>
                </div>
            </div>
        </div>
    </div>
</div>
