<div class="task-view">
    <h3>{{ $ctrl.task.title }}</h3>
    <p>{{ $ctrl.task.description }}</p>

    <form ng-submit="$ctrl.submitResponse()">
        <label for="responseInput">Your Response:</label>
        <input
        id="responseInput"
        type="text"
        ng-model="$ctrl.response"
        placeholder="Type your answer here"
        />
        <button type="submit">Submit</button>
    </form>
</div>
