version: "3.9"


networks:
  ethicapp-net:
    driver: bridge

secrets:
  jwt_token:
    file: ./secrets/jwt_token

services:
  # ---------------------------------------------------------
  # Node web app
  # ---------------------------------------------------------
  node:
    container_name: "ethicapp-apiV2-node"
    build:
      context: ethicapp/
      args:
        NODE_VERSION: ${NODE_VERSION}
    secrets:
      - jwt_token
    environment:
      NODE_ENV: development
      NODE_PORT: ${NODE_PORT}
      ETHICAPP_DOMAIN_NAME: ${ETHICAPP_DOMAIN_NAME}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      REDIS_HOST: RedisContainer
      DB_NAME: ${DB_NAME}
      DB_USER_NAME: ${DB_USER_NAME}
      DB_USER_PASSWORD: ${DB_USER_PASSWORD}
    restart: "no"
    networks:
      - ethicapp-net
    ports:
      - "${NODE_PORT}:${NODE_PORT}"
    volumes:
      - "./ethicapp:/home/app:rw"
    depends_on:
      - RedisContainer
      - postgres

  # ---------------------------------------------------------
  # Admin Panel
  # ---------------------------------------------------------
  admin-panel:
    container_name: "ethicapp-apiV2-admin-panel"
    build:
      context: admin-panel/
      args:
        REACT_APP_API_PORT: ${NODE_PORT}
        REACT_APP_DOMAIN: ${ETHICAPP_DOMAIN_NAME}
    ports:
      - "3000:3000"
    networks:
      - ethicapp-net
    depends_on:
      - node
      - RedisContainer

  # ---------------------------------------------------------
  # Redis Cache
  # ---------------------------------------------------------
  RedisContainer:
    image: redis
    container_name: ethicapp-apiV2-redis
    #ports:
    # - "6379:6379"
    networks:
      - ethicapp-net

  # ---------------------------------------------------------
  # Postgres Database
  # ---------------------------------------------------------
  postgres:
    container_name: "ethicapp-apiV2-postgres"
    build:
      context: postgres-db/
      args:
        UBUNTU_VERSION: "22.04"
        POSTGRES_VERSION: ${POSTGRES_VERSION}
        DB_NAME: ${DB_NAME}
        DB_USER_NAME: ${DB_USER_NAME}
        DB_USER_PASSWORD: ${DB_USER_PASSWORD}
    environment:
      POSTGRES_LOG_LEVEL: 1
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER_NAME}
      POSTGRES_PASSWORD: ${DB_USER_PASSWORD}
      PGPORT: 5432
      PGDATA: /var/lib/postgresql/${POSTGRES_VERSION}/main
    restart: unless-stopped
    networks:
      - ethicapp-net
    healthcheck:
      test: ["CMD-SHELL", "su healthcheckuser -c pg_isready"]
      interval: 20s
      timeout: 5s
      retries: 1
      start_period: 10s
    volumes:
      - "${HOST_DB_VOLUME_PATH}:/var/lib/postgresql/${POSTGRES_VERSION}/main:rw"

  # ---------------------------------------------------------
  # PGAdmin
  # ---------------------------------------------------------
  pgadmin:
    container_name: "ethicapp-apiV2-pgadmin"
    build:
      context: pgadmin/
      args:
        PGADMIN_VERSION: ${PGADMIN_VERSION}
        POSTGRES_CONN_PORT: 5432
        POSTGRES_CONN_USER: ${DB_USER_NAME}
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    restart: unless-stopped
    networks:
      - ethicapp-net
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      postgres:
        condition: service_healthy