version: '3.8'

services:
  ethicapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ethicapp
    environment:
      - PORT=8501
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - POSTGRES_DB=ethicapp
      - PGHOST=postgresql
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - ethicapp_node_modules:/app/node_modules
      - uploads:/app/uploads
      - sessions:/app/sessions
    depends_on:
      - postgresql

  postgresql:
    build:
      context: ./db_config
      dockerfile: Dockerfile
    container_name: ethicapp-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ethicapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  ethicapp_node_modules:
  sessions:
  pgdata:
  uploads:
