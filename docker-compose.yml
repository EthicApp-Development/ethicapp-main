services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    environment:
      - NGINX_MAINTENANCE_MODE=${NGINX_MAINTENANCE_MODE:-false}
      - NGINX_MAINTENANCE_RETRY_AFTER=${NGINX_MAINTENANCE_RETRY_AFTER:-3600}
      - ETHICAPP_NODE_PORT=${ETHICAPP_NODE_PORT:-8501}
      - PORT=${PORT:-8502}
      - ETHICAPP_STUDENT_NODE_PORT=${ETHICAPP_STUDENT_NODE_PORT:-8503}
      - MNG_PORT=${MNG_PORT:-8504}
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d/dev.conf:/etc/nginx/dev.conf:ro
      - ./nginx/static:/usr/share/nginx/html/static:ro
      - uploads:/var/www/uploads:ro
    networks:
      default:
      shared-dev:
        aliases:
          - ethicapp.local

  ethicapp:
    build:
      context: .
      dockerfile: ethicapp/Dockerfile
    env_file:
      - ./.env.shared
      - ./.env
      - ./ethicapp/.env
    environment:
      - NODE_ENV=development
      - ETHICAPP_WATCH_FRONTEND=true
      - EXTERNAL_MOCK_SERVICE_URL=http://external-mock-service:8510
      - POLYADIC_AGENTS_URL=http://ai-apps.local/poly-api
      - REDIS_SESSION_HOST=redis
      - REDIS_SESSION_PORT=6379
      - REDIS_CACHE_HOST=redis
      - REDIS_CACHE_PORT=6379
    expose:
      - "8501"
      - "9229"
    volumes:
      - ./ethicapp:/app
      - ./database/seeds:/database/seeds
      - ethicapp_backend_node_modules:/app/backend/node_modules
      - ethicapp_frontend_node_modules:/app/frontend/node_modules
      - uploads:/app/backend/uploads
    depends_on:
      - postgresql
      - redis
      - external-mock-service

  external-mock-service:
    build:
      context: ./external-mock-service
      dockerfile: Dockerfile
    environment:
      - PORT=8510
    volumes:
      - ./external-mock-service:/app
      - external_mock_service_node_modules:/app/node_modules
    command: >
      sh -lc '
        npm install &&
        exec npm start
      '
    expose:
      - "8510"

  ethicapp-pdf-worker:
    build:
      context: .
      dockerfile: ethicapp/Dockerfile
    env_file:
      - ./.env.shared
      - ./.env
      - ./ethicapp/.env
    environment:
      - NODE_ENV=development
      - ETHICAPP_PROCESS_ROLE=pdf-render-worker
      - PDF_RENDER_WORKER_CONCURRENCY=1
      - PDF_RENDER_WORKER_POLL_INTERVAL_MS=2000
      - PDF_RENDER_DPI=200
      - PDF_RENDER_MAX_PAGES=50
      - PDF_RENDER_TIMEOUT_MS=120000
    volumes:
      - ./ethicapp:/app
      - ethicapp_pdf_worker_backend_node_modules:/app/backend/node_modules
      - uploads:/app/backend/uploads
    depends_on:
      flyway:
        condition: service_completed_successfully

  management-console-student-anonymization:
    build:
      context: ./management-console
      dockerfile: Dockerfile
    profiles:
      - maintenance
    env_file:
      - ./.env.shared
      - ./management-console/.env
    environment:
      - NODE_ENV=development
      - STUDENT_ANONYMIZATION_DRY_RUN=false
    volumes:
      - ./management-console:/app
      - management_console_student_anonymization_backend_node_modules:/app/backend/node_modules
    command: >
      sh -lc '
        cd /app/backend &&
        npm install --include=dev &&
        npm run anonymize:students
      '
    depends_on:
      flyway:
        condition: service_completed_successfully

  auth-backend:
    build:
      context: ./auth-backend
      dockerfile: Dockerfile
    env_file:
      - ./.env.shared
      - ./auth-backend/.env
    environment:
      - NODE_ENV=development
      - REDIS_SESSION_HOST=redis
      - REDIS_SESSION_PORT=6379
    volumes:
      - ./auth-backend:/app
      - auth_backend_node_modules:/app/node_modules
      - auth_frontend_node_modules:/app/frontend/node_modules
    command: >
      sh -c "
        npm install --include=dev &&
        cd frontend && npm install --include=dev &&
        cd /app &&
        (
          npm run dev &
          npm run frontend:dev
        )
      "
    expose:
      - "8502"
      - "5173"
    depends_on:
      flyway:
        condition: service_completed_successfully
      redis:
        condition: service_started

  ethicapp-student:
    build:
      context: ./ethicapp-student
      dockerfile: Dockerfile
    env_file:
      - ./.env.shared
      - ./ethicapp-student/.env
      - ./ethicapp-student/backend/.env
    environment:
      - NODE_ENV=development
      - ETHICAPP_STUDENT_NODE_PORT=8503
    volumes:
      - ./ethicapp-student:/app
      - ethicapp_student_backend_node_modules:/app/backend/node_modules
      - ethicapp_student_frontend_node_modules:/app/frontend/node_modules
    command: >
      sh -lc '
        cd /app/backend &&
        npm install --include=dev &&
        (
          npm run dev
        ) &
        cd /app/frontend &&
        npm install --include=dev &&
        exec npm run dev
      '
    expose:
      - "8503"
      - "5174"
    depends_on:
      flyway:
        condition: service_completed_successfully

  management-console:
    build:
      context: ./management-console
      dockerfile: Dockerfile
    env_file:
      - ./.env.shared
      - ./management-console/.env
    environment:
      - NODE_ENV=development
      - MNG_PORT=8504
    volumes:
      - ./management-console:/app
      - management_console_backend_node_modules:/app/backend/node_modules
      - management_console_frontend_node_modules:/app/frontend/node_modules
    command: >
      sh -lc '
        cd /app/backend &&
        npm install --include=dev &&
        (
          npm run dev
        ) &
        cd /app/frontend &&
        npm install --include=dev &&
        exec npm run dev
      '
    expose:
      - "8504"
      - "5175"
    depends_on:
      flyway:
        condition: service_completed_successfully

  postgresql:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ethicapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ethicapp"]
      interval: 5s
      timeout: 5s
      retries: 20

  flyway:
    image: flyway/flyway:11-alpine
    command: migrate
    environment:
      - FLYWAY_URL=jdbc:postgresql://postgresql:5432/ethicapp
      - FLYWAY_USER=postgres
      - FLYWAY_PASSWORD=postgres
      - FLYWAY_CONNECT_RETRIES=60
      - FLYWAY_LOCATIONS=filesystem:/flyway/migrations
    volumes:
      - ./database/migrations:/flyway/migrations:ro
    depends_on:
      postgresql:
        condition: service_healthy
    restart: "no"

  redis:
    image: redis:alpine
    command: >
      sh -c 'exec redis-server
      --maxmemory "${REDIS_SESSION_MAXMEMORY:-128mb}"
      --maxmemory-policy "${REDIS_SESSION_MAXMEMORY_POLICY:-volatile-ttl}"'

networks:
  shared-dev:
    external: true

volumes:
  auth_backend_node_modules:
  auth_frontend_node_modules:
  ethicapp_backend_node_modules:
  ethicapp_pdf_worker_backend_node_modules:
  ethicapp_frontend_node_modules:
  ethicapp_student_backend_node_modules:
  ethicapp_student_frontend_node_modules:
  management_console_backend_node_modules:
  management_console_student_anonymization_backend_node_modules:
  management_console_frontend_node_modules:
  external_mock_service_node_modules:
  pgdata:
  uploads: