version: '3.8'

services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ethicapp-nginx
    ports:
      - "80:80"
    depends_on:
      - ethicapp
      - auth-backend
    volumes:
      - uploads:/var/www/uploads:ro

  ethicapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ethicapp
    env_file:
      - ./.env.shared
      - ./.env
    expose:
      - "8501"
    volumes:
      - .:/app
      - ethicapp_node_modules:/app/node_modules
      - uploads:/app/uploads
      - sessions:/app/sessions
    depends_on:
      - postgresql

  auth-backend:
    build:
      context: ./auth-backend
      dockerfile: Dockerfile
    container_name: ethicapp-auth
    env_file:
      - ./.env.shared
      - ./auth-backend/.env
    environment:
      - NODE_ENV=production
    expose:
      - "8502"
    depends_on:
      - postgresql

  postgresql:
    build:
      context: ./db_config
      dockerfile: Dockerfile
    container_name: ethicapp-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ethicapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  ethicapp_node_modules:
  sessions:
  pgdata:
  uploads: