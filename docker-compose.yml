services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - ethicapp
      - auth-backend
      - ethicapp-student
      - management-console
    volumes:
      - ./nginx/conf.d/dev.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/static:/usr/share/nginx/html/static:ro

  ethicapp:
    build:
      context: ./ethicapp
      dockerfile: Dockerfile
    env_file:
      - ./.env.shared
      - ./.env
      - ./ethicapp/.env
    environment:
      - NODE_ENV=development
      - ETHICAPP_WATCH_FRONTEND=true
      - REDIS_SESSION_HOST=redis
      - REDIS_SESSION_PORT=6379
      - REDIS_CACHE_HOST=redis
      - REDIS_CACHE_PORT=6379
    expose:
      - "8501"
      - "9229"
    volumes:
      - ./ethicapp:/app
      - ./database/seeds:/database/seeds
      - ethicapp_backend_node_modules:/app/backend/node_modules
      - ethicapp_frontend_node_modules:/app/frontend/node_modules
      - uploads:/app/backend/uploads
    depends_on:
      - postgresql
      - redis

  ethicapp-pdf-worker:
    build:
      context: ./ethicapp
      dockerfile: Dockerfile
    env_file:
      - ./.env.shared
      - ./.env
      - ./ethicapp/.env
    environment:
      - NODE_ENV=development
      - ETHICAPP_PROCESS_ROLE=pdf-render-worker
      - PDF_RENDER_WORKER_CONCURRENCY=1
      - PDF_RENDER_WORKER_POLL_INTERVAL_MS=2000
      - PDF_RENDER_DPI=150
      - PDF_RENDER_MAX_PAGES=50
      - PDF_RENDER_TIMEOUT_MS=120000
    volumes:
      - ./ethicapp:/app
      - ethicapp_backend_node_modules:/app/backend/node_modules
      - uploads:/app/backend/uploads
    depends_on:
      - postgresql

  auth-backend:
    build:
      context: ./auth-backend
      dockerfile: Dockerfile
    env_file:
      - ./.env.shared
      - ./auth-backend/.env
    environment:
      - NODE_ENV=development
      - REDIS_SESSION_HOST=redis
      - REDIS_SESSION_PORT=6379
    volumes:
      - ./auth-backend:/app
      - auth_backend_node_modules:/app/node_modules
      - auth_frontend_node_modules:/app/frontend/node_modules
    command: >
      sh -c "
        npm install &&
        cd frontend && npm install &&
        cd /app &&
        npx nodemon server.js &
        cd frontend && npx vite --host 0.0.0.0 --port 5173
      "
    expose:
      - "8502"
      - "5173"
    depends_on:
      - postgresql
      - redis

  ethicapp-student:
    build:
      context: ./ethicapp-student
      dockerfile: Dockerfile
    env_file:
      - ./.env.shared
      - ./ethicapp-student/.env
      - ./ethicapp-student/backend/.env
    environment:
      - NODE_ENV=development
      - ETHICAPP_STUDENT_NODE_PORT=8503
    volumes:
      - ./ethicapp-student:/app
      - ethicapp_student_backend_node_modules:/app/backend/node_modules
      - ethicapp_student_frontend_node_modules:/app/frontend/node_modules
    command: >
      sh -lc '
        cd /app/backend &&
        npm install --include=dev &&
        (
          npm run dev
        ) &
        cd /app/frontend &&
        npm install --include=dev &&
        exec npm run dev
      '
    expose:
      - "8503"
      - "5174"
    depends_on:
      - postgresql

  management-console:
    build:
      context: ./management-console
      dockerfile: Dockerfile
    env_file:
      - ./.env.shared
      - ./management-console/.env
    environment:
      - NODE_ENV=development
      - MNG_PORT=8504
    volumes:
      - ./management-console:/app
      - management_console_backend_node_modules:/app/backend/node_modules
      - management_console_frontend_node_modules:/app/frontend/node_modules
    command: >
      sh -lc '
        cd /app/backend &&
        npm install --include=dev &&
        (
          npm run dev
        ) &
        cd /app/frontend &&
        npm install --include=dev &&
        exec npm run dev
      '
    expose:
      - "8504"
      - "5175"
    depends_on:
      - postgresql

  postgresql:
    build:
      context: ./database
      dockerfile: Dockerfile
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ethicapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    command: >
      sh -c 'exec redis-server
      --maxmemory "${REDIS_SESSION_MAXMEMORY:-128mb}"
      --maxmemory-policy "${REDIS_SESSION_MAXMEMORY_POLICY:-volatile-ttl}"'

volumes:
  auth_backend_node_modules:
  auth_frontend_node_modules:
  ethicapp_backend_node_modules:
  ethicapp_frontend_node_modules:
  ethicapp_student_backend_node_modules:
  ethicapp_student_frontend_node_modules:
  management_console_backend_node_modules:
  management_console_frontend_node_modules:
  pgdata:
  uploads:
